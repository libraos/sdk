        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Connector configuration store unavailable (requires PostgreSQL and an integration key).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/connectors/{kind}:
    get:
      operationId: getConnector
      summary: Get one connector config (secret values masked)
      tags: [Connectors]
      parameters:
        - name: kind
          in: path
          required: true
          description: Connector kind identifier (e.g. sharepoint).
          schema: { type: string }
      responses:
        '200':
          description: The connector config with secret keys listed but values masked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  connector: { $ref: '#/components/schemas/Connector' }
                required: [connector]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Connector configuration store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      operationId: putConnector
      summary: Upsert a connector's settings and merge its secrets
      description: >-
        Creates or updates the connector. Secret merge semantics: a non-empty
        value overwrites, an empty string deletes that key, and absent keys are
        preserved — so a single credential can be rotated without resending the rest.
      tags: [Connectors]
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConnectorUpsert' }
      responses:
        '200':
          description: The stored connector config (masked view).
          content:
            application/json:
              schema:
                type: object
                properties:
                  connector: { $ref: '#/components/schemas/Connector' }
                required: [connector]
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Connector configuration store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: deleteConnector
      summary: Remove a connector config
      tags: [Connectors]
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The connector was deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: deleted }
                required: [status]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Connector configuration store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/connectors/{kind}/credentials:
    get:
      operationId: getConnectorCredentials
      summary: Read a connector's decrypted credentials (for connector services)
      description: >-
        Returns decrypted secret values for the connector. Intended for connector
        services authenticating with an admin or service credential; every access
        is logged with the caller identity.
      tags: [Connectors]
      parameters:
        - name: kind
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The connector config plus its decrypted secret values.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConnectorCredentials' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Connector configuration store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/connectors/sharepoint/sync-status:
    get:
      operationId: getSharepointSyncStatus
      summary: SharePoint grounding connector sync status
      description: >-
        Returns the SharePoint sync worker's status snapshot: last sync time,
        per-cycle item counts, last error, and whether a delta resume link is persisted.
      tags: [Connectors]
      responses:
        '200':
          description: The current SharePoint sync status snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  kind: { type: string, example: sharepoint }
                  status: { $ref: '#/components/schemas/SyncStatus' }
                required: [kind, status]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: SharePoint sync worker is not running (requires PostgreSQL).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/employees/{employee_id}/house-profile:
    get:
      operationId: getHouseProfile
      summary: Get an employee's house profile
      tags: [Employees]
      parameters:
        - name: employee_id
          in: path
          required: true
          description: Employee (persona) identifier.
          schema: { type: string }
      responses:
        '200':
          description: The employee's house-profile markdown and its last-updated timestamp.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HouseProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: House-profile store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      operationId: putHouseProfile
      summary: Replace an employee's house profile
      description: >-
        Replaces the employee's house-profile markdown. Send an empty markdown
        string to clear it. Optionally supply an If-Match header carrying the
        profile's current updated_at to guard against a concurrent overwrite.
      tags: [Employees]
      parameters:
        - name: employee_id
          in: path
          required: true
          schema: { type: string }
        - name: If-Match
          in: header
          required: false
          description: >-
            The profile's current updated_at (RFC 3339). When present and it does
            not match the stored value, the write is rejected with 409.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HouseProfileUpdate' }
      responses:
        '200':
          description: The stored house-profile markdown and its authoritative updated_at.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HouseProfile' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: If-Match precondition failed; the profile was modified concurrently.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: stale }
                  current_updated_at: { type: string }
        '413':
          description: The markdown exceeds the maximum allowed size.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: too_large }
                  max_bytes: { type: integer }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: House-profile store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/entitlements:
    get:
      operationId: getEntitlements
      summary: Get a tenant's effective entitlement flags
      description: >-
        Returns the tenant's effective flags (free floor overlaid with any stored
        overrides). A tenant with no stored row reads the free floor. The tenant is
        supplied via the tenant query parameter.
      tags: [Entitlements]
      parameters:
        - name: tenant
          in: query
          required: true
          description: Tenant identifier.
          schema: { type: string }
      responses:
        '200':
          description: The tenant's effective entitlement flags.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementsEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Entitlements store unavailable (requires PostgreSQL).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      operationId: putEntitlements
      summary: Upsert a tenant's entitlement flags
      description: The tenant is supplied via the tenant query parameter.
      tags: [Entitlements]
      parameters:
        - name: tenant
          in: query
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntitlementsUpdate' }
      responses:
        '200':
          description: The tenant's stored effective flags after the update.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementsEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Entitlements store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/entitlements/{tenant}:
    get:
      operationId: getTenantEntitlements
      summary: Get a tenant's effective entitlement flags
      tags: [Entitlements]
      parameters:
        - name: tenant
          in: path
          required: true
          description: Tenant identifier.
          schema: { type: string }
      responses:
        '200':
          description: The tenant's effective entitlement flags.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementsEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Entitlements store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    put:
      operationId: putTenantEntitlements
      summary: Upsert a tenant's entitlement flags
      tags: [Entitlements]
      parameters:
        - name: tenant
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EntitlementsUpdate' }
      responses:
        '200':
          description: The tenant's stored effective flags after the update.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EntitlementsEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Entitlements store unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  # ==== auth ====
  /.well-known/openid-configuration:
    get:
      operationId: oauthDiscovery
      summary: OpenID Connect discovery document
      description: >-
        Public discovery metadata (issuer, authorization/token/userinfo
        endpoints, supported scopes and grant types). No authentication.
        The advertised `jwks_uri` is informational — id_tokens are HS256, not
        JWKS-verifiable.
      tags: [OAuth]
      security: []
      responses:
        '200':
          description: Discovery metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OidcDiscovery'
  /oauth/openid:
    get:
      operationId: oauthOpenid
      summary: Legacy authorization alias
      description: >-
        Compatibility alias that 302-redirects to `/oauth/authorize`,
        forwarding all query parameters verbatim. Present for clients that
        hard-code this path as the authorization URL.
      tags: [OAuth]
      security: []
      responses:
        '302':
          description: Redirect to `/oauth/authorize` preserving the query string.
  /oauth/authorize:
    get:
      operationId: oauthAuthorize
      summary: Authorization endpoint
      description: >-
        OAuth 2.0 / OIDC authorization endpoint. With no valid session cookie
        it renders the login page (HTML); with a valid session it issues a
        single-use authorization code and 302-redirects to the client's
        registered `redirect_uri` with `code` and `state`. Supports PKCE
        (S256); some clients require it.
      tags: [OAuth]
      security: []
      parameters:
        - name: client_id
          in: query
          required: true
          schema: { type: string }
        - name: redirect_uri
          in: query
          required: false
          description: Must exactly match the registered value; defaults to it when omitted.
          schema: { type: string, format: uri }
        - name: response_type
          in: query
          required: false
          schema: { type: string, enum: [code] }
        - name: scope
          in: query
          required: false
          description: Space-delimited; e.g. `openid profile email offline_access`.
          schema: { type: string }
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: code_challenge
          in: query
          required: false
          description: PKCE challenge; required for public/PKCE-only clients.
          schema: { type: string }
        - name: code_challenge_method
          in: query
          required: false
          description: Accepted for compatibility; challenges are always treated as S256.
          schema: { type: string, enum: [S256] }
      responses:
        '200':
          description: Login page (no valid session).
          content:
            text/html:
              schema: { type: string }
        '302':
          description: Redirect to `redirect_uri` with `code` and `state`.
        '400':
          description: >-
            `invalid_client`, `redirect_uri_mismatch`, or `pkce_required`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OauthError' }
  /oauth/login:
    post:
      operationId: oauthLogin
      summary: Submit login credentials
      description: >-
        Verifies email + password, sets the `nova_oidc_session` cookie, and
        redirects to the `continue` URL (typically the original
        `/oauth/authorize` request). On failure re-renders the login page with
        a generic error (no account enumeration).
      tags: [OAuth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                continue:
                  type: string
                  description: Post-login redirect target (same-origin relative path).
      responses:
        '200':
          description: 'Login page re-rendered with an error, or `{ "status": "logged_in" }` when no `continue` was supplied.'
        '302':
          description: Redirect to the `continue` URL.
  /oauth/token:
    post:
      operationId: oauthToken
      summary: Token endpoint
      description: >-
        Exchanges an authorization code, rotates a refresh token, or (when
        service clients are configured) performs the `client_credentials`
        grant. Accepts both `application/x-www-form-urlencoded` and
        `application/json` bodies. Issues 1-hour HS256 access/id tokens.
      tags: [OAuth]
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema: { $ref: '#/components/schemas/TokenRequest' }
          application/json:
            schema: { $ref: '#/components/schemas/TokenRequest' }
      responses:
        '200':
          description: Issued token set.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400':
          description: >-
            `invalid_grant`, `redirect_uri_mismatch`, `pkce_required`,
            `pkce_mismatch`, `invalid_scope`, or `unsupported_grant_type`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OauthError' }
        '401':
          description: '`invalid_client` (bad client_credentials).'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OauthError' }
  /oauth/revoke:
    post:
      operationId: oauthRevoke
      summary: Revoke a refresh token
      description: >-
        Revokes the presented refresh token. Always returns 200 regardless of
        whether the token existed (no token-existence disclosure).
      tags: [OAuth]
      security: []
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token: { type: string }
      responses:
        '200':
          description: Revocation acknowledged (empty body).
  /oauth/userinfo:
    get:
      operationId: oauthUserinfo
      summary: UserInfo endpoint
      description: Returns identity claims decoded from the bearer access/id token.
      tags: [OAuth]
      responses:
        '200':
          description: Identity claims.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /oauth/clients:
    get:
      operationId: oauthClients
      summary: List registered OIDC clients
      description: Returns the registered relying-party clients (id, redirect URI, app id).
      tags: [OAuth]
      responses:
        '200':
          description: Registered clients.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/OidcClient' }
  /oauth/login/{provider}:
    get:
      operationId: oauthUpstreamLogin
      summary: Start upstream IdP sign-in
      description: >-
        Begins the relying-party dance against a configured upstream provider
        (Google/Okta/Azure/Authentik/GitHub): sets a signed one-shot state
        cookie and 302-redirects to the provider's authorization URL.
      tags: [OAuth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
        - name: continue
          in: query
          required: false
          description: Same-origin relative path to return to after sign-in.
          schema: { type: string }
      responses:
        '302':
          description: Redirect to the upstream provider.
        '404':
          description: '`unknown_provider`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OauthError' }
  /oauth/login/{provider}/callback:
    get:
      operationId: oauthUpstreamCallback
      summary: Upstream IdP callback
      description: >-
        Completes the upstream exchange, JIT-creates or links the local user,
        establishes the `nova_oidc_session` cookie, and redirects to the
        original `continue` target. On any failure re-renders the login page.
      tags: [OAuth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: query
          required: false
          schema: { type: string }
        - name: state
          in: query
          required: false
          schema: { type: string }
        - name: error
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Login page re-rendered with an error.
          content:
            text/html:
              schema: { type: string }
        '302':
          description: Redirect to the `continue` target on success.
        '404':
          description: '`unknown_provider`.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OauthError' }
  /scim/v2/ServiceProviderConfig:
    get:
      operationId: scimServiceProviderConfig
      summary: SCIM service provider configuration
      description: >-
        Advertises supported SCIM capabilities (patch supported, filter
        supported, bulk/sort/etag/changePassword unsupported) and the OAuth
        bearer authentication scheme. Authenticated with the SCIM token.
      tags: [SCIM]
      security:
        - scimBearer: []
      responses:
        '200':
          description: Service provider configuration document.
          content:
            application/scim+json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /scim/v2/ResourceTypes:
    get:
      operationId: scimResourceTypes
      summary: SCIM resource types
      description: Discovery document listing the supported SCIM resource types (User).
      tags: [SCIM]
      security:
        - scimBearer: []
      responses:
        '200':
          description: ResourceType list response.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /scim/v2/Schemas:
    get:
      operationId: scimSchemas
      summary: SCIM schemas
      description: Discovery document describing the supported User attribute schema.
      tags: [SCIM]
      security:
        - scimBearer: []
      responses:
        '200':
          description: Schema list response.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /scim/v2/Users:
    get:
      operationId: scimListUsers
      summary: List / query SCIM users
      description: >-
        Lists provisioned users. Supports the `userName eq "value"` filter IdPs
        send for correlation, plus `startIndex`/`count` pagination (count
        capped at 200).
      tags: [SCIM]
      security:
        - scimBearer: []
      parameters:
        - name: filter
          in: query
          required: false
          description: Only `userName eq "value"` is supported.
          schema: { type: string }
        - name: startIndex
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: count
          in: query
          required: false
          schema: { type: integer, minimum: 0, default: 100, maximum: 200 }
      responses:
        '200':
          description: List response of users.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimListResponse' }
        '400':
          description: Unsupported filter (`invalidFilter`).
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: scimCreateUser
      summary: Provision a SCIM user
      description: Creates a user from the IdP-supplied resource; `userName` (email) is unique.
      tags: [SCIM]
      security:
        - scimBearer: []
      requestBody:
        required: true
        content:
          application/scim+json:
            schema: { $ref: '#/components/schemas/ScimUser' }
      responses:
        '201':
          description: Created user (with `Location` header).
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimUser' }
        '400':
          description: '`invalidSyntax` / `invalidValue`.'
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: '`uniqueness` — userName already exists.'
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
  /scim/v2/Users/{id}:
    get:
      operationId: scimGetUser
      summary: Get a SCIM user
      tags: [SCIM]
      security:
        - scimBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The user resource.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: User not found.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
    put:
      operationId: scimReplaceUser
      summary: Replace a SCIM user
      description: Full replace of the mapped attributes; an omitted `active` defaults to true.
      tags: [SCIM]
      security:
        - scimBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/scim+json:
            schema: { $ref: '#/components/schemas/ScimUser' }
      responses:
        '200':
          description: The updated user resource.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimUser' }
        '400':
          description: '`invalidSyntax` / `invalidValue`.'
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: User not found.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
        '409':
          description: '`uniqueness` — userName already exists.'
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
    patch:
      operationId: scimPatchUser
      summary: Patch a SCIM user
      description: >-
        Applies an RFC 7644 PatchOp list. The `replace` on `active` is the
        deprovision path (disable → active=false). Accepts the string
        `"True"`/`"False"` boolean form some IdPs send.
      tags: [SCIM]
      security:
        - scimBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/scim+json:
            schema: { $ref: '#/components/schemas/ScimPatchOp' }
      responses:
        '200':
          description: The updated user resource.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimUser' }
        '400':
          description: '`invalidSyntax` / `invalidValue` / unsupported op.'
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: User not found.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
        '409':
          description: '`uniqueness` — userName already exists.'
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
    delete:
      operationId: scimDeleteUser
      summary: Deactivate a SCIM user
      description: >-
        Soft-deactivates the account (is_active=false); history is preserved
        and the account can no longer authenticate. Never a hard delete.
      tags: [SCIM]
      security:
        - scimBearer: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deactivated (empty body).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: User not found.
          content:
            application/scim+json:
              schema: { $ref: '#/components/schemas/ScimError' }
  /api/service-keys:
    get:
      operationId: listServiceKeys
      summary: List service API keys
      description: Lists tenant-wide inference-scoped service keys. Admin only. Secrets are never returned.
      tags: [APIKeys]
      responses:
        '200':
          description: The service keys.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceKeyList' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createServiceKey
      summary: Mint a service API key
      description: >-
        Creates a tenant-wide, inference-scoped `nk_` key. Admin only. The full
        secret is returned exactly once in this response and is never
        recoverable afterward.
      tags: [APIKeys]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateServiceKeyRequest' }
      responses:
        '201':
          description: The minted key including its one-time secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceKeySecret' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/service-keys/self:
    post:
      operationId: createSelfServiceKey
      summary: Self-serve an inference API key
      description: >-
        Any authenticated user may mint an inference-scoped `nk_` key bound to
        their own account. The full secret is returned once. Available only when
        Gateway Mode per-key policy is enabled.
      tags: [APIKeys]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateServiceKeyRequest' }
      responses:
        '201':
          description: The minted key including its one-time secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ServiceKeySecret' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/service-keys/{keyId}:
    delete:
      operationId: deleteServiceKey
      summary: Revoke a service API key
      description: Soft-revokes (deactivates) the key. Admin only.
      tags: [APIKeys]
      parameters:
        - name: keyId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Revoked.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  id: { type: string }
                  is_active: { type: boolean, example: false }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/agents/{id}/keys:
    post:
      operationId: createAgentKey
      summary: Mint a per-agent API key
      description: >-
        Creates a long-lived `nk_` key scoped to a single agent. Admin only. The
        full secret is returned exactly once and is never recoverable afterward.
      tags: [APIKeys]
      parameters:
        - name: id
          in: path
          required: true
          description: Agent id.
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '201':
          description: The minted key including its one-time secret.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AgentKey' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  # ==== opsapps ====
  /v1/apps:
    get:
      operationId: listApps
      summary: List installed apps
      description: >-
        Returns every installed app with its version, lifecycle status, and
        live agent count. Admin-only. Returns 503 when persistent storage is
        not configured.
      tags: [Apps]
      responses:
        '200':
          description: Installed apps.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503':
          description: Apps registry not configured (persistent storage required).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/apps/{app}/agents:
    get:
      operationId: listAppAgents
      summary: List an app's agents
      description: Lists every agent registered under the given app namespace. Admin-only.
      tags: [Apps]
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Agents registered under the app.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppAgentList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /v1/apps/{app}/agents/{id}:
    get:
      operationId: getAppAgent
      summary: Get one app-scoped agent
      description: Returns a single agent (id + capabilities) scoped to the app namespace. Admin-only.
      tags: [Apps]
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The app-scoped agent.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppAgent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/apps/{app}/agents/{id}/chat:
    post:
      operationId: appAgentChat
      summary: Chat with an app-scoped agent
      description: >-
        Sends a chat turn to an agent resolved within the given app namespace.
        Accepts the standard chat request body (simple `message` or OpenAI-style
        `messages`); set `stream: true` for Server-Sent Events.
      tags: [Apps]
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NativeChatRequest' }
      responses:
        '200':
          description: Chat response (JSON), or an SSE stream when `stream` is true.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NativeChatResult' }
            text/event-stream:
              schema: { type: string }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/apps/{app}/migrations:
    get:
      operationId: listAppMigrations
      summary: List an app's migration history
      description: >-
        Returns the schema-migration audit rows for the app, ordered by
        filename. Failed migrations carry their `error_message`. Admin-only;
        503 when persistent storage is not configured.
      tags: [Apps]
      parameters:
        - name: app
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Migration history for the app.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppMigrationList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Apps registry not configured (persistent storage required).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/apps/{name}/install:
    post:
      operationId: installApp
      summary: Install or reactivate an app
      description: >-
        Installs (or reactivates) the staged app: validates its manifest,
        applies pending migrations, and registers its agents. Admin-only.
      tags: [Apps]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Install result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInstallResult' }
        '400':
          description: Malformed app name (e.g. path-traversal or empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: Staged directory has no app manifest.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Validation, lint, or migration-apply errors.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInstallResult' }
  /v1/apps/{name}/reload:
    post:
      operationId: reloadApp
      summary: Reload an installed app
      description: Re-runs the install pipeline for an already-registered app. Admin-only.
      tags: [Apps]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Reload result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInstallResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Validation, lint, or migration-apply errors.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInstallResult' }
  /v1/apps/{name}/uninstall:
    post:
      operationId: uninstallApp
      summary: Uninstall an app
      description: >-
        Soft-deletes an installed app and unregisters its agents. Admin-only.
      tags: [Apps]
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Uninstall result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInstallResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Errors while unwinding the app.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AppInstallResult' }
  /api/mcp:
    post:
      operationId: mcpRpc
      summary: MCP JSON-RPC endpoint
      description: >-
        Model Context Protocol endpoint speaking JSON-RPC 2.0. Supported methods:
        `initialize`, `tools/list`, `tools/call`, `resources/list`, `resources/read`.
        Requires an authenticated caller with the `mcp:read` scope. Feature-gated:
        when MCP is disabled the endpoint returns 404. Protocol-level failures
        (unknown method, invalid params, rate limit) are returned as HTTP 200 with
        a JSON-RPC error object. The wildcard form `POST /api/mcp/*` behaves
        identically.
      tags: [MCP]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/McpRequest' }
      responses:
        '200':
          description: JSON-RPC response envelope (result or error).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/McpResponse' }
        '400':
          description: Request body was not valid JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Missing `mcp:read` scope or caller identity.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: MCP is disabled on this deployment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /api/skills/{skill}/{tool}/run:
    post:
      operationId: runSkillTool
      summary: Run one skill tool directly
      description: >-
        Invokes a single tool belonging to a skill and returns its raw string
        output, bypassing the agent loop. The request body is the tool's own
        argument JSON (e.g. `{ "query": "..." }` or `{ "url": "..." }`); an empty
        body is treated as `{}`.
      tags: [Skills]
      parameters:
        - name: skill
          in: path
          required: true
          schema: { type: string }
        - name: tool
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: The tool's raw output.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillRunResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404':
          description: Skill or tool not found.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: The tool handler returned an error.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Skills catalog not initialized.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/features:
    get:
      operationId: getFeatures
      summary: Feature-status snapshot
      description: >-
        Returns an in-memory snapshot of each gated feature's resolved state
        (on / off / degraded), where it resolved from, its flag name, and a
        reason. Admin-only. No secret values are exposed. 503 when disabled via
        the runtime hatch.
      tags: [Ops]
      responses:
        '200':
          description: Feature-status snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeatureList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503':
          description: Feature-status endpoint disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/infra-health:
    get:
      operationId: getInfraHealth
      summary: Infrastructure health aggregation
      description: >-
        On-read aggregation of recent call activity into error clusters, tool
        errors, latency percentiles, identity errors, and grounding outcomes,
        over a rolling window. Admin-only. Requires persistent storage.
      tags: [Ops]
      parameters:
        - name: window
          in: query
          description: Rolling window as a duration (e.g. `24h`, `90m`). Default 24h, capped at 7d.
          schema: { type: string, default: '24h' }
        - name: limit
          in: query
          description: Max rows per aggregated list. Default 20, capped at 200.
          schema: { type: integer, default: 20 }
        - name: agent
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Aggregated infra-health report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InfraHealth' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503':
          description: Endpoint disabled, or persistent storage not configured.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/logs:
    get:
      operationId: getLogs
      summary: Read server or request logs
      description: >-
        Paginated read of server logs (`source=server`, in-memory ring buffer,
        lost on restart) or request logs (`source=requests`, persisted call
        rows). Admin-only. 503 when disabled via the runtime hatch or when
        `source=requests` and persistent storage is not configured.
      tags: [Ops]
      parameters:
        - name: source
          in: query
          description: Log source.
          schema: { type: string, enum: [server, requests], default: server }
        - name: limit
          in: query
          description: Max rows. Default 200, capped at 1000.
          schema: { type: integer, default: 200 }
        - name: since
          in: query
          description: RFC 3339 lower bound. Default 1h ago.
          schema: { type: string, format: date-time }
        - name: level
          in: query
          schema: { type: string, enum: [debug, info, warn, error] }
        - name: q
          in: query
          description: Case-insensitive substring filter.
          schema: { type: string }
        - name: cursor
          in: query
          description: Opaque pagination cursor from a prior response's `next_cursor`.
          schema: { type: string }
        - name: request_id
          in: query
          description: Filter to a single request/call id (source=requests).
          schema: { type: string }
      responses:
        '200':
          description: A page of log entries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LogList' }
        '400':
          description: Invalid `source` value.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '503':
          description: Endpoint disabled, or source=requests requires persistent storage.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
