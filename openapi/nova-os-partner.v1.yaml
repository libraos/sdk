  /v1/managed/field-policies/{type}/evaluate:
    post:
      operationId: evaluateFieldPolicy
      summary: Evaluate field access for a caller against a record
      description: >-
        Admin-only canonical reference. Computes the caller's visible/writable
        fields for the record type and returns the enforced view. With `mode`
        omitted (read) the response strips non-visible fields and audits the
        access; with `mode:"write"` it filters to writable fields. A missing
        policy fails closed (nothing visible, nothing writable).
      tags: [FieldPolicies]
      parameters:
        - name: type
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FieldEvaluateRequest' }
      responses:
        '200':
          description: The access decision plus the enforced record view.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldEvaluateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
