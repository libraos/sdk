openapi: 3.1.0
info:
  title: Nova OS Partner API
  version: 1.0.0-alpha.6
  description: |
    Partner integration API for Nova OS. Mirrors Anthropic Managed Agents
    1:1 for the compat surface (Section 1.1 of the design); extends with
    employees, multi-model config, web-search backend selection, custom-tool
    webhook callbacks, and async jobs (Section 1.2).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Nova OS Team
    url: https://github.com/MeganovaAI/nova-os-sdk
    email: support@meganova.ai

servers:
  - url: https://nova.partner.example.com
    description: Partner-self-hosted Nova OS (v1 default)
  - url: https://api.nova-os.com
    description: Nova OS managed cloud (future)
  - url: http://localhost:8900
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Deployment
    description: Boot-time capabilities / model-tier / locale / auth read.
  - name: Agents
    description: Create, read, update, delete managed agents and personas.
  - name: Chat
    description: Native chat, OpenAI-compatible completions, models, token counting.
  - name: Messages
    description: Anthropic-compatible Messages API.
  - name: Jobs
    description: Asynchronous agent jobs (submit, poll, stream, cancel).
  - name: Documents
    description: Upload, list, delete, OCR, and text-extract documents.
  - name: Knowledge
    description: Knowledge collections, hybrid search, ingest, curation signals.
  - name: Memory
    description: Read a persona's observational memory.
  - name: Employees
    description: Digital-employee CRUD, portable bundles, and house profiles.
  - name: Personas
    description: Boot-time persona manifest.
  - name: Files
    description: OpenAI-compatible file upload and retrieval.
  - name: Conversations
    description: Conversation registry and per-conversation attachments.
  - name: Audio
    description: Speech-to-text, text-to-speech, and realtime voice.
  - name: Images
    description: OpenAI-compatible image generation, edits, and variations.
  - name: Actions
    description: Dry-run / approval queue for side-effecting tool actions.
  - name: Groups
    description: Departmental groups that gate action approval queues.
  - name: FieldPolicies
    description: Field-level access policy, evaluation, and audit.
  - name: Connectors
    description: External-system connectors and their credentials.
  - name: Entitlements
    description: Per-tenant entitlement flags.
  - name: Hooks
    description: Lifecycle webhook subscriptions.
  - name: Filesystem
    description: Per-session file workspaces.
  - name: Sessions
    description: Native sessions.
  - name: Settings
    description: Runtime platform settings.
  - name: Users
    description: Platform user management.
  - name: OAuth
    description: OIDC provider and relying-party sign-in.
  - name: SCIM
    description: SCIM 2.0 user provisioning.
  - name: APIKeys
    description: Service and per-agent API keys.
  - name: Apps
    description: Installed-app lifecycle and app-scoped agents.
  - name: MCP
    description: Model Context Protocol JSON-RPC endpoint.
  - name: Skills
    description: Direct single-tool invocation.
  - name: Ops
    description: Feature status, infra health, and logs.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed JWT bearer token. Partners mint tokens server-side per
        their tenancy model. The cloud variant accepts `msk_live_…` tokens
        in the same Bearer slot.

    scimBearer:
      type: http
      scheme: bearer
      description: |
        SCIM 2.0 provisioning bearer token (configured server-side), distinct
        from the end-user JWT. Used only by the /scim/v2/* endpoints.
  schemas:
    Error:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum:
            - invalid_request_error
            - authentication_error
            - permission_error
            - not_found_error
            - rate_limit_error
            - billing_error
            - upstream_error
            - vertex_schema_error
            - validation_error
            - internal_error
        message:
          type: string
        param:
          type: string
          description: When applicable, the request parameter that failed validation.
        code:
          type: string
          description: Machine-readable subcode (e.g., "credits_exhausted", "USAGE_LIMIT_EXCEEDED").
        retry_after:
          type: integer
          description: Seconds — present on rate_limit_error.
        tool_name:
          type: string
          description: Present on vertex_schema_error — the tool whose schema is invalid.
        parameter_path:
          type: string
          description: Present on vertex_schema_error — JSON path to the offending parameter.
        fix_hint:
          type: string
          description: Human-readable hint for actionable errors.

    AgentType:
      type: string
      enum: [persona, skill]
      description: |
        Whether this agent dispatches to other skill agents (persona) or
        executes one skill directly (skill). Maps to nova-os internals;
        partners only see the discriminator.

    ModelSlot:
      type: object
      required: [primary]
      properties:
        primary:
          type: string
          description: Model identifier in `<vendor>/<model>` shape (e.g., `gemini/gemini-3.1-pro-preview`).
          pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$'
        fallback:
          type: array
          items:
            type: string
            pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$'
          description: |
            Ordered fallback chain. Activates on rate-limit / 5xx / vendor outage /
            Vertex 400 schema-error before falling through to the next resolution level.

    ModelConfig:
      type: object
      description: |
        Three-slot model configuration. Any slot may be omitted; resolution
        falls through per the spec (per-call → per-skill → per-agent →
        per-employee → server default).
      properties:
        answer:
          $ref: '#/components/schemas/ModelSlot'
          description: Main chat / synthesis model.
        planner:
          $ref: '#/components/schemas/ModelSlot'
          description: Brain / DAG planning model.
        skill:
          $ref: '#/components/schemas/ModelSlot'
          description: Cheap tier for skill agents + report sections.

    WebSearchBackend:
      type: string
      enum: [tavily, brave, exa, searxng, meganova, auto]
      description: |
        Web search backend selection. `auto` uses the server's default
        priority order (operator-configured).

    WebSearchConfig:
      type: object
      description: |
        Persona-level web-search configuration. Resolved per-invocation on
        ``skill_deep_research`` via ``searchctx.WebSearchConfigFromContext``.
        Field names changed in nova-os PR #212 (closes #200) — old
        ``backend`` / ``fallback`` are no longer accepted.
      properties:
        primary_backend:
          $ref: '#/components/schemas/WebSearchBackend'
          default: auto
          description: |
            Primary search backend. ``auto`` falls through to the server's
            ``DefaultSearcher()`` priority order.
        fallback_chain:
          type: array
          items:
            $ref: '#/components/schemas/WebSearchBackend'
          description: |
            Ordered fallback chain. Used on empty/error/off-topic results.
            Wraps the primary in a ``FallbackSearcher`` whose ``Name()``
            renders as ``primary→fallback1→fallback2``.
        reformulator:
          type: boolean
          default: true
          description: |
            Wrap the search call with the LLM reformulator. Improves
            retrieval quality on broad queries. Applied only to keyword
            backends; bundled-extraction backends handle reformulation
            internally.
        recency_terms:
          type: array
          items:
            type: string
          description: Custom recency markers for the recency-intent escalator.

    JSONSchemaObject:
      type: object
      description: |
        A subset of JSON Schema Draft 2020-12 used for tool input schemas.
        Vertex AI rejects `type:array` without `items` — the SDK validator
        enforces `items` is present everywhere on write.
      additionalProperties: true

    CustomToolCallback:
      type: object
      required: [url, auth]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS URL (or http://localhost:* for dev). Webhook target.
        auth:
          type: object
          required: [type, secret_ref]
          properties:
            type:
              type: string
              enum: [hmac_sha256]
            secret_ref:
              type: string
              description: Settings-store key holding the HMAC shared secret.
        timeout_sec:
          type: integer
          minimum: 1
          maximum: 600
          default: 30
        retry:
          type: object
          properties:
            max_attempts:
              type: integer
              minimum: 1
              maximum: 10
              default: 3
            backoff:
              type: string
              enum: [exponential, linear, fixed]
              default: exponential

    CustomTool:
      type: object
      required: [name, input_schema]
      properties:
        name:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          description: Lowercase snake_case identifier; unique within the agent.
        description:
          type: string
          description: Free-text description shown to the LLM via the tool definition.
        input_schema:
          $ref: '#/components/schemas/JSONSchemaObject'
        callback:
          $ref: '#/components/schemas/CustomToolCallback'
          description: |
            Per-tool callback override. Falls through to agent.callback then
            employee.callback. Required at one of the three levels.

    Skill:
      type: object
      required: [name]
      properties:
        name:
          type: string
        model:
          type: string
          pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$'
          description: Per-skill model override (highest priority below per-call).

    Agent:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          pattern: '^[a-z0-9-]+$'
          description: Slug generated from the agent name.
        version:
          type: integer
          readOnly: true
        name:
          type: string
        model:
          type: string
          description: Optional model override; empty means inherit the server tier default.
        system:
          type: string
        tools:
          type: array
          items:
            type: string
        owner:
          type: string
          description: Owner email; defaults to the caller when omitted.
        visibility:
          type: string
          enum: ["", private, public]
        agent_type:
          $ref: '#/components/schemas/AgentType'
        brain:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        max_turns:
          type: integer
          minimum: 0
          maximum: 100
        output_type:
          $ref: '#/components/schemas/OutputTypeContract'
        knowledge_bindings:
          type: array
          items:
            type: string
        guardrails:
          type: object
          additionalProperties: true
        filesystem:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          readOnly: true

        # Legacy SDK aliases kept optional for transition. The live Nova OS
        # server accepts the canonical fields above.
        type:
          $ref: '#/components/schemas/AgentType'
          deprecated: true
        owner_employee:
          type: string
          deprecated: true
        system_prompt:
          type: string
          deprecated: true

    AgentCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        model:
          type: string
        system:
          type: string
        tools:
          type: array
          items:
            type: string
        owner:
          type: string
        visibility:
          type: string
          enum: ["", private, public]
        filesystem:
          type: object
          additionalProperties: true
        agent_type:
          $ref: '#/components/schemas/AgentType'
        brain:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        max_turns:
          type: integer
          minimum: 0
          maximum: 100
        output_type:
          $ref: '#/components/schemas/OutputTypeContract'
        knowledge_bindings:
          type: array
          items:
            type: string
        guardrails:
          type: object
          additionalProperties: true

    AgentUpdate:
      type: object
      description: Partial update; only the fields supplied are changed.
      properties:
        name:
          type: string
        model:
          type: string
        system:
          type: string
        tools:
          type: array
          items:
            type: string
        owner:
          type: string
        visibility:
          type: string
          enum: ["", private, public]
        filesystem:
          type: object
          additionalProperties: true
        agent_type:
          $ref: '#/components/schemas/AgentType'
        brain:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        max_turns:
          type: integer
        output_type:
          $ref: '#/components/schemas/OutputTypeContract'
        knowledge_bindings:
          type: array
          items:
            type: string
        guardrails:
          type: object
          additionalProperties: true

    AgentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        has_more:
          type: boolean
        next_cursor:
          type: string

    Employee:
      type: object
      required: [id]
      properties:
        id:
          type: string
          pattern: '^[a-z0-9-]+$'
        display_name:
          type: string
        description:
          type: string
        model_config:
          $ref: '#/components/schemas/ModelConfig'
          description: Cascades to all owned agents unless they override.
        web_search_config:
          $ref: '#/components/schemas/WebSearchConfig'
          description: Cascades to owned agents.
        callback:
          $ref: '#/components/schemas/CustomToolCallback'
          description: Catch-all callback for any owned-agent tool with no closer match.
        agents:
          type: array
          items:
            type: string
          description: IDs of agents owned by this employee.
          readOnly: true
        storage_path:
          type: string
          description: Filesystem path under users/<owner>/employees/<id>/.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    EmployeeCreate:
      allOf:
        - $ref: '#/components/schemas/Employee'
      required: [id]

    EmployeeUpdate:
      type: object
      properties:
        display_name:
          type: string
        description:
          type: string
        model_config:
          $ref: '#/components/schemas/ModelConfig'
        web_search_config:
          $ref: '#/components/schemas/WebSearchConfig'
        callback:
          $ref: '#/components/schemas/CustomToolCallback'

    EmployeeList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
        has_more:
          type: boolean
        next_cursor:
          type: string

    BundleManifest:
      type: object
      required: [schema_version, employee_id, nova_os_min_version, created_at]
      properties:
        schema_version:
          type: integer
          enum: [1]
        employee_id:
          type: string
        nova_os_min_version:
          type: string
        created_at:
          type: string
          format: date-time
        agents:
          type: array
          items:
            type: string
        knowledge_files:
          type: integer

    BundleImportResult:
      type: object
      required: [employee_id, agents_imported]
      properties:
        employee_id:
          type: string
        agents_imported:
          type: integer
        knowledge_files_indexed:
          type: integer
        warnings:
          type: array
          items:
            type: string

    Role:
      type: string
      enum: [user, assistant, system]

    TextBlock:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string

    ToolUseBlock:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    ToolResultBlock:
      type: object
      required: [type, tool_use_id, content]
      properties:
        type:
          type: string
          enum: [tool_result]
        tool_use_id:
          type: string
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/TextBlock'
        is_error:
          type: boolean
          default: false

    ContentBlock:
      oneOf:
        - $ref: '#/components/schemas/TextBlock'
        - $ref: '#/components/schemas/ToolUseBlock'
        - $ref: '#/components/schemas/ToolResultBlock'
      discriminator:
        propertyName: type

    Message:
      type: object
      required: [role, content]
      properties:
        role:
          $ref: '#/components/schemas/Role'
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ContentBlock'

    ToolDefinition:
      type: object
      required: [name, input_schema]
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          $ref: '#/components/schemas/JSONSchemaObject'
        type:
          type: string
          enum:
            - custom
            - web_search_20250305
            - text_editor_20250124
            - bash_20250124
          default: custom

    MessageRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        model:
          type: string
          description: Per-call override; matches Anthropic shape, also accepts <vendor>/<model>.
          pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$|^claude-[a-z0-9._-]+$'
        max_tokens:
          type: integer
          minimum: 1
          maximum: 64000
          default: 4096
        temperature:
          type: number
          minimum: 0
          maximum: 2
        system:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        stream:
          type: boolean
          default: false
        metadata:
          type: object
          properties:
            agent_id:
              type: string
              description: |
                Target a specific Nova OS agent/persona for this turn; omit
                for the default agent. Typed here so generated clients can set
                it without falling back to untyped additionalProperties.
            brain:
              type: boolean
              description: Per-call planner toggle (3-state — null inherits server default).
            stream_events:
              type: boolean
              description: Per-call orchestration event streaming toggle.
            stream_thinking:
              type: boolean
              description: Per-call planner-thinking event toggle.
          additionalProperties: true

    MessageResponse:
      type: object
      required: [id, role, content, model, stop_reason]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message]
        role:
          $ref: '#/components/schemas/Role'
        content:
          type: array
          items:
            $ref: '#/components/schemas/ContentBlock'
        model:
          type: string
          description: Resolved model that handled the request.
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, stop_sequence, tool_use]
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
        model_used:
          type: string
          description: Nova OS extension — same as `model`, surfaced for clarity.
        fallback_triggered:
          type: boolean
          description: Nova OS extension — true if a fallback model handled the request.
        output_violations:
          type: array
          description: |
            Nova OS extension — populated only when the agent declared an
            `output_type` contract AND the reply failed validation AND the
            agent's `violation_mode` is `log` or `repair` (with `error`,
            the response is a 422 instead). Empty array means no violations.
          items:
            $ref: '#/components/schemas/OutputViolation'
        route_hint:
          $ref: '#/components/schemas/RouteHint'
          description: |
            Nova OS extension (v0.1.5+) — Brain's dispatch hint to the
            partner UI. Always present on terminal replies; partners that
            don't consume route hints can ignore the field. Three kinds:
            `render_inline`, `navigate_to`, `ask_clarification`.

    StreamEventTextDelta:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [text]
        content:
          type: string

    StreamEventToolUse:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    StreamEventToolResult:
      type: object
      required: [type, tool_use_id]
      properties:
        type:
          type: string
          enum: [tool_result]
        tool_use_id:
          type: string
        output_summary:
          type: string
          description: Preview-truncated (~1KB on the wire); full payload in call_log.
        is_error:
          type: boolean

    StreamEventCustomToolUse:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [custom_tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    StreamEventThinking:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [thinking]
        content:
          type: string

    StreamEventError:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          $ref: '#/components/schemas/Error'

    StreamEventDone:
      type: object
      required: [type, status]
      properties:
        type:
          type: string
          enum: [done]
        status:
          type: string
          enum: [completed, failed, cancelled]
        message_id:
          type: string

    StreamEventRouteHint:
      type: object
      required: [type, route_hint]
      description: |
        Nova OS extension (v0.1.5+) — emitted exactly once per terminal
        message right before `done`. Carries Brain's dispatch decision so
        partner UIs can react before the full reply is rendered.
      properties:
        type:
          type: string
          enum: [route_hint]
        route_hint:
          $ref: '#/components/schemas/RouteHint'

    StreamEvent:
      oneOf:
        - $ref: '#/components/schemas/StreamEventTextDelta'
        - $ref: '#/components/schemas/StreamEventToolUse'
        - $ref: '#/components/schemas/StreamEventToolResult'
        - $ref: '#/components/schemas/StreamEventCustomToolUse'
        - $ref: '#/components/schemas/StreamEventThinking'
        - $ref: '#/components/schemas/StreamEventError'
        - $ref: '#/components/schemas/StreamEventDone'
        - $ref: '#/components/schemas/StreamEventRouteHint'
      discriminator:
        propertyName: type

    OutputTypeContract:
      type: object
      required: [schema]
      description: |
        Structured-output contract for agent replies. When set, Nova OS
        validates every assistant reply against `schema` before return.
        Server-side since v0.1.4.
      properties:
        schema:
          $ref: '#/components/schemas/JSONSchemaObject'
          description: JSON Schema 2020-12 the assistant reply must validate against.
        violation_mode:
          type: string
          enum: [error, log, repair]
          default: error
          description: |
            How to handle a reply that fails validation:
            - `error` — return HTTP 422 with the violations.
            - `log` — return the reply as-is plus `output_violations`; partner decides what to do.
            - `repair` — re-prompt the model once with the schema in the system prompt;
              return whichever attempt validates, plus `output_violations` from the first.

    OutputViolation:
      type: object
      required: [path, message]
      properties:
        path:
          type: string
          description: JSON Pointer into the assistant reply where the violation occurred.
        message:
          type: string
          description: Human-readable description of the failure (from the JSON Schema validator).
        keyword:
          type: string
          description: The JSON Schema keyword that failed (e.g. `type`, `required`, `enum`).

    RouteHintRenderInline:
      type: object
      required: [kind]
      description: |
        Brain decided the reply is the answer — render it inline in the
        partner's chat UI. No navigation needed.
      properties:
        kind:
          type: string
          enum: [render_inline]

    RouteHintNavigateTo:
      type: object
      required: [kind, template]
      description: |
        Brain decided the partner UI should navigate to a route. The
        template name MUST match a key in the agent's `route_templates`;
        the server interpolates `params` into the URL template.
      properties:
        kind:
          type: string
          enum: [navigate_to]
        template:
          type: string
          description: Key into the agent's `route_templates` map.
        params:
          type: object
          additionalProperties: true
          description: Values to interpolate into the template's `{placeholder}` segments.

    RouteHintAskClarification:
      type: object
      required: [kind, reason]
      description: |
        Brain decided more input is needed before answering — partner UI
        should present a clarification prompt rather than rendering the
        reply as final.
      properties:
        kind:
          type: string
          enum: [ask_clarification]
        reason:
          type: string
          description: Short human-readable rationale (e.g. `missing_jurisdiction`).

    RouteHint:
      description: |
        Brain's dispatch hint, present on every terminal reply (v0.1.5+).
        Three kinds — partners switch on `kind` to decide UI behaviour.
      oneOf:
        - $ref: '#/components/schemas/RouteHintRenderInline'
        - $ref: '#/components/schemas/RouteHintNavigateTo'
        - $ref: '#/components/schemas/RouteHintAskClarification'
      discriminator:
        propertyName: kind

    CustomToolResultRequest:
      type: object
      required: [tool_use_id, output]
      properties:
        tool_use_id:
          type: string
        output:
          type: string
        is_error:
          type: boolean
          default: false

    JobStatus:
      type: string
      enum: [queued, running, completed, failed, cancelled]

    Job:
      type: object
      required: [job_id, agent_id, status, created_at]
      properties:
        job_id:
          type: string
        agent_id:
          type: string
        employee_id:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/MessageResponse'
        error:
          $ref: '#/components/schemas/Error'
        event_count:
          type: integer
          readOnly: true
        instance_id:
          type: string
          readOnly: true

    JobCreate:
      type: object
      required: [agent_id, messages]
      properties:
        agent_id:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        model:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        metadata:
          type: object
          additionalProperties: true

    JobList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        has_more:
          type: boolean
        next_cursor:
          type: string

    # ── Documents (#175) ──────────────────────────────────────────────
    Document:
      type: object
      required: [id, title]
      properties:
        id: { type: string, readOnly: true }
        title: { type: string, description: File name or extracted title }
        path: { type: string, description: Collection path (e.g. "contracts/2026") }
        type: { type: string, description: "Document type — pdf, docx, md, etc." }
        size_bytes: { type: integer, format: int64, readOnly: true }
        collection_id: { type: string, description: Parent collection (empty = root) }
        metadata:
          type: object
          additionalProperties: { type: string }
          description: Mime, pages, author, etc.
        created_at: { type: string, format: date-time, readOnly: true }

    DocumentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Document' }
        has_more: { type: boolean }
        next_cursor: { type: string }

    # ── Knowledge (#176) ──────────────────────────────────────────────
    KnowledgeChunk:
      type: object
      required: [content]
      properties:
        content: { type: string }
        collection: { type: string }
        document_id: { type: string }
        score: { type: number, format: float }
        metadata:
          type: object
          additionalProperties: true

    KnowledgeSearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        collection:
          type: string
          description: Collection to search; empty = caller's own collection.
        top_k: { type: integer, minimum: 1, maximum: 100, default: 5 }
        threshold: { type: number, format: float, minimum: 0, maximum: 1 }

    KnowledgeSearchResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/KnowledgeChunk' }

    KnowledgeIngestRequest:
      type: object
      required: [content]
      properties:
        title: { type: string }
        content: { type: string, description: Document text (already extracted) }
        collection:
          type: string
          default: default
          description: Target collection; defaults to "default".
        metadata:
          type: object
          additionalProperties: true

    KnowledgeCollectionList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { type: string }

    # ── Hooks (#177, in-memory first slice) ──────────────────────────
    HookEvent:
      type: string
      enum:
        - SessionStart
        - SessionEnd
        - UserPromptSubmit
        - PreToolUse
        - PostToolUse
        - PreInference
        - PostInference
        - Stop
        - Error
      description: |
        The 9 canonical lifecycle events. Validated server-side at
        registration time; unknown values return 400.

    HookSubscription:
      type: object
      required: [id, event, target_url, enabled, created_at]
      properties:
        id: { type: string, readOnly: true }
        event: { $ref: '#/components/schemas/HookEvent' }
        target_url: { type: string, format: uri }
        secret_env:
          type: string
          description: Env var name holding the HMAC shared secret on the partner side.
        description: { type: string }
        enabled: { type: boolean, default: true }
        created_at: { type: string, format: date-time, readOnly: true }

    HookSubscriptionCreate:
      type: object
      required: [event, target_url]
      properties:
        event: { $ref: '#/components/schemas/HookEvent' }
        target_url: { type: string, format: uri }
        secret_env: { type: string }
        description: { type: string }
        enabled: { type: boolean }

    HookSubscriptionList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/HookSubscription' }

    # ── Filesystem (#178, first slice) ───────────────────────────────
    FileMeta:
      type: object
      required: [path, size, mtime]
      properties:
        path: { type: string, description: Agent-visible path including mount prefix (e.g. "/workspace/PLAN.md"). }
        size: { type: integer, format: int64, description: Plaintext byte length. }
        mtime: { type: string, format: date-time }
        content_type: { type: string }
        sha256: { type: string, description: Hex-encoded SHA-256 of the plaintext. Used for If-Match optimistic concurrency. }

    FileMetaList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/FileMeta' }
        has_more: { type: boolean, description: True when truncated by the limit query param. }

    # ── Users (#179) ──────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string, readOnly: true }
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          enum: [admin, manager, developer, employee]
        must_change_password: { type: boolean, readOnly: true }
        created_at: { type: string, format: date-time, readOnly: true }

    UserCreate:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          enum: [admin, manager, developer, employee]
          default: employee

    UserList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/User' }

    # ── Settings (#179) ──────────────────────────────────────────────
    SettingValue:
      type: object
      required: [key, value]
      properties:
        key: { type: string }
        value:
          description: Setting value — type varies per key (string for model identifiers, int for thresholds, bool for feature flags).

    # ── Personas (#187 server / nova-os-sdk#14 SDK) ──────────────────
    PersonaTriage:
      type: string
      enum: [always_brain, never_brain, conditional]
      description: |
        Resolved persona triage default. ``always_brain`` forces the
        planner; ``never_brain`` skips it; ``conditional`` defers to
        the per-turn regex/LLM triage chain. Per-call ``metadata.brain``
        on the messages endpoint still wins as an override. Resolved
        server-side by the canonical ``persona.ResolveTriage`` function
        — partners receive the projected value, not the raw frontmatter.

    PersonaManifestEntry:
      type: object
      required: [id, display_name, capabilities, triage, emits_route_hint_kinds, route_template_names]
      properties:
        id: { type: string }
        display_name: { type: string }
        capabilities:
          type: array
          items: { type: string }
          description: Skill labels the persona dispatches to.
        triage: { $ref: '#/components/schemas/PersonaTriage' }
        emits_route_hint_kinds:
          type: array
          items:
            type: string
            enum: [render_inline, navigate_to, ask_clarification]
          description: Which RouteHint kinds the persona emits at all (drives partner UI prep).
        route_template_names:
          type: array
          items: { type: string }
          description: Keys into the agent's route_templates map; partners pre-resolve URL templates.

    Manifest:
      type: object
      required: [manifest_version, personas]
      description: |
        Boot-time persona discovery contract. Partners cache by
        ``manifest_version`` (sha256 over canonical-JSON) and use
        ``If-None-Match`` on subsequent fetches to short-circuit at 304.
      properties:
        manifest_version:
          type: string
          description: |
            ``sha256:<hex>`` — emitted as ``ETag``. Partners send
            ``If-None-Match: <manifest_version>`` to skip the body when
            unchanged.
        personas:
          type: array
          items: { $ref: '#/components/schemas/PersonaManifestEntry' }

    PersonaNotFoundError:
      type: object
      required: [error, id]
      description: Returned on GET /agents/v1/personas/{id} miss. Distinct envelope from the standard Error type for backwards-compat with the existing `/agents/v1/*` surface.
      properties:
        error: { type: string, example: "persona not found" }
        id: { type: string, description: The requested persona id (echoed back). }

    # ── Sessions (#185) ──────────────────────────────────────────────
    Session:
      type: object
      required: [id, agent_id]
      properties:
        id: { type: string, readOnly: true, description: "Format: sess_<uuid>." }
        agent_id: { type: string }
        environment_id: { type: string }
        model:
          type: string
          description: Session-default LLM override; per-event model on the messages endpoint takes precedence.
        created_at: { type: string, format: date-time, readOnly: true }

    SessionCreate:
      type: object
      required: [agent_id]
      properties:
        agent_id: { type: string }
        environment_id: { type: string }
        model: { type: string }

    # ── Deployment / capabilities read (design D1) ────────────────────
    Deployment:
      type: object
      required: [version, capabilities]
      description: |
        Minimal, derive-friendly capabilities read so a client (web/iOS) can
        discover what this Nova OS instance supports without probing each
        endpoint. Per the contract-unification design (D1, lean: derive),
        this is intentionally small — the persona manifest
        (`GET /agents/v1/personas`) remains the source of truth for *which*
        agents exist; this read surfaces server-level feature flags, model
        tiers, enabled locales, and the auth contract clients need at boot.
        All fields are advisory; absence means "not advertised", not "off".
      properties:
        version:
          type: string
          description: Nova OS server version (e.g. "v0.1.9"). "dev"/"unknown" on unstamped builds.
        capabilities:
          type: array
          description: |
            Stable string labels for optional server features a client may
            branch on (e.g. "observational_memory", "report_generator",
            "async_jobs", "workflows", "knowledge_gate", "ag_ui_streaming").
            Open-ended — unknown labels are ignored by older clients.
          items: { type: string }
        models:
          type: object
          description: |
            Resolved model tiers (advisory; no secrets). Lets a client show
            "powered by" / pick a tier without hardcoding model ids.
          properties:
            answer: { type: string, description: Default answer/synthesis model id. }
            skill: { type: string, description: Cheap-tier skill/section model id. }
            brain: { type: string, description: Planner/brain model id. }
          additionalProperties: false
        locales:
          type: array
          description: Enabled UI locales; first is the default (e.g. ["en","zh-CN"]).
          items: { type: string }
        auth:
          type: object
          description: |
            The interactive-login contract clients should use. OIDC details
            live in the hand-authored `docs/oidc-client-flow.md`; this block
            only advertises the issuer + whether OIDC is enabled so a client
            can construct the Auth-Code+PKCE flow.
          properties:
            oidc_enabled:
              type: boolean
              description: True when the embedded OIDC provider is available for interactive login.
            issuer:
              type: string
              description: OIDC issuer / public base URL (discovery root). Empty when OIDC disabled.
          additionalProperties: false

    # ---- chat ----
    ChatMessage:
      type: object
      description: A single conversation message.
      required: [role, content]
      properties:
        role:
          type: string
          description: 'Message author role, e.g. system, user, assistant.'
        content:
          type: string
          description: Message text content.

    NativeChatMetadata:
      type: object
      description: >
        Opaque per-request metadata. Nova OS does not interpret arbitrary keys
        (they are threaded through tenant isolation and audit), but a few
        reserved keys control per-call behavior.
      additionalProperties: true
      properties:
        stream_events:
          type: boolean
          description: >
            When true (and streaming), emit granular orchestration events
            (tool_use / tool_result / text / thinking) over SSE.
        stream_thinking:
          type: boolean
          description: >
            When true, include model reasoning as `thinking` SSE events.
            Independent of stream_events; default off.
        max_tokens:
          type: integer
          description: >
            Per-call output-token cap for the answer, overriding the agent's
            configured limit. Must be > 0; clamped to 32768.
        brain:
          type: string
          description: >
            Per-call planning override. One of `always` or `never`; controls
            whether the multi-step planner runs for this turn.
          enum: [always, never]

    NativeChatRequest:
      type: object
      description: >
        Native chat request. Supply either `message` (simple form) or
        `messages` (OpenAI array form).
      properties:
        message:
          type: string
          description: Simple single-message form (mutually usable with `messages`).
        messages:
          type: array
          description: OpenAI-style conversation history.
          items: { $ref: '#/components/schemas/ChatMessage' }
        conversation_id:
          type: string
          description: Conversation/session identifier for continuity.
        session_id:
          type: string
          description: Alternate session identifier.
        model:
          type: string
          description: Optional model hint (server-side routing may override).
        stream:
          type: boolean
          description: When true the response is delivered as an SSE stream.
        fast:
          type: boolean
          description: >
            Dispatch directly to the agent's primary skill, skipping planning.
            Returns 400 if the agent has no skills. No-op on single-skill agents.
        include_metadata:
          type: boolean
          description: >
            When true, include additional diagnostic fields (e.g. tools_used,
            per-stage details) in the response.
        metadata:
          $ref: '#/components/schemas/NativeChatMetadata'

    UsageStage:
      type: object
      description: Token usage for one stage/sub-call of a turn.
      properties:
        stage:
          type: string
          description: The stage/agent that made the sub-call.
        model:
          type: string
          description: The model used for the sub-call.
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }

    UsageBlock:
      type: object
      description: >
        Aggregated token usage across all of the turn's model sub-calls, with a
        per-stage breakdown. Omitted on non-model/zero-usage turns. Excludes
        embedding calls.
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
        by_stage:
          type: array
          items: { $ref: '#/components/schemas/UsageStage' }

    NativeChatResult:
      type: object
      description: Synchronous native chat response.
      properties:
        response:
          type: string
          description: The assistant's answer text.
        conversation_id:
          type: string
        agent_id:
          type: string
        message_id:
          type: string
          description: Assistant turn identifier for per-message correlation.
        images:
          type: array
          items: { type: string }
        files:
          type: array
          items: { type: string }
        grounding:
          type: string
          description: >
            Per-turn grounded-vs-refusal outcome. Omitted on non-retrieval turns.
          enum: [grounded, ungrounded_refusal, ungrounded_no_chunks, degraded]
        retrieved_chunks:
          type: array
          description: Source ids of knowledge chunks surfaced by this turn.
          items: { type: string }
        tools_used:
          type: array
          description: Unique tool names dispatched this turn (include_metadata only).
          items: { type: string }
        usage:
          $ref: '#/components/schemas/UsageBlock'

    NativeJobAccepted:
      type: object
      description: Response to an accepted async job submission (202).
      properties:
        job_id: { type: string }
        status:
          type: string
          description: Initial status, always `queued`.
        agent_id: { type: string }
        created_at:
          type: string
          format: date-time

    NativeJob:
      type: object
      description: Async job state.
      properties:
        job_id: { type: string }
        agent_id: { type: string }
        status:
          type: string
          description: Job lifecycle status.
          enum: [queued, running, done, failed, cancelled]
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          description: Present once the job begins running.
        finished_at:
          type: string
          format: date-time
          description: Present once the job reaches a terminal state.
        event_count:
          type: integer
          description: Number of events emitted so far.
        result:
          type: string
          description: Final output text (present when done).
        error:
          type: string
          description: Failure message (present when failed).
        tokens_used:
          type: integer

    NativeJobCancelled:
      type: object
      properties:
        job_id: { type: string }
        status:
          type: string
          description: Always `cancelled`.

    ChatCompletionRequest:
      type: object
      description: OpenAI-compatible chat completion request.
      required: [messages]
      properties:
        model:
          type: string
          description: >
            Target model/agent id. When gateway mode is enabled, a value of the
            form `llm:<provider>/<model>` selects raw provider passthrough.
        messages:
          type: array
          items: { $ref: '#/components/schemas/ChatMessage' }
        stream:
          type: boolean
          description: When true the response is an SSE stream terminated by `[DONE]`.
        max_tokens:
          type: integer
          description: Output-token cap (folded into the per-call answer limit).
        max_completion_tokens:
          type: integer
          description: >
            Newer OpenAI field for the output-token cap; preferred over
            max_tokens when both are set.
        temperature:
          type: number
          description: >
            Sampling temperature. Accepted for OpenAI-client compatibility;
            server-side routing controls the effective value on the agent path.
        metadata:
          type: object
          description: >
            Nova OS extension channel for per-call fields (e.g. a per-call model
            override).
          additionalProperties: true

    ChatCompletionChoice:
      type: object
      properties:
        index: { type: integer }
        message: { $ref: '#/components/schemas/ChatMessage' }
        finish_reason:
          type: string
          description: The provider's real stop reason.
          enum: [stop, length, tool_calls]

    ChatCompletionUsage:
      type: object
      description: Per-response token usage.
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }

    ChatCompletionResponse:
      type: object
      description: OpenAI-compatible chat completion response.
      properties:
        id: { type: string }
        object:
          type: string
          description: Always `chat.completion`.
        created:
          type: integer
          description: Unix timestamp (seconds).
        model: { type: string }
        choices:
          type: array
          items: { $ref: '#/components/schemas/ChatCompletionChoice' }
        usage:
          $ref: '#/components/schemas/ChatCompletionUsage'
        nova_grounding:
          type: string
          description: >
            Nova OS extension — per-turn grounded-vs-refusal outcome. Omitted on
            non-retrieval turns.
          enum: [grounded, ungrounded_refusal, ungrounded_no_chunks, degraded]
        persisted_state:
          type: object
          description: >
            Merged persisted field state, present only for agents that declare a
            persist-fields schema.
          additionalProperties: true

    ModelListEntry:
      type: object
      properties:
        id:
          type: string
          description: Model/agent id. Passthrough models carry an `llm:` prefix.
        object:
          type: string
          description: Always `model`.
        created:
          type: integer
        owned_by:
          type: string

    ModelList:
      type: object
      description: OpenAI-compatible model list.
      properties:
        object:
          type: string
          description: Always `list`.
        data:
          type: array
          items: { $ref: '#/components/schemas/ModelListEntry' }

    CountTokensMessage:
      type: object
      description: One message in an Anthropic-shaped request.
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          description: >
            Message content — a plain string or the Anthropic content-block array.
          oneOf:
            - type: string
            - type: array
              items: { type: object, additionalProperties: true }

    CountTokensRequest:
      type: object
      description: Anthropic-compatible Messages request used for token counting.
      required: [messages]
      properties:
        model:
          type: string
        messages:
          type: array
          items: { $ref: '#/components/schemas/CountTokensMessage' }
        system:
          description: System prompt — a string or an array of text blocks.
          oneOf:
            - type: string
            - type: array
              items: { type: object, additionalProperties: true }
        metadata:
          type: object
          additionalProperties: true
          description: Optional metadata; `agent_id` selects the agent for validation.

    CountTokensResult:
      type: object
      properties:
        input_tokens:
          type: integer
          description: Estimated number of input tokens for the supplied prompt.
    # ---- media ----
    TranscriptionRequest:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: Audio file to transcribe (e.g. mp3, wav, m4a, webm).
        model:
          type: string
          description: >-
            Transcription model (provider-prefixed, e.g.
            `Systran/faster-whisper-large-v3`). Overrides the server default for
            this call. A bare model name is rejected by the gateway.
          example: Systran/faster-whisper-large-v3
        language:
          type: string
          description: >-
            ISO-639-1 language hint. Omit to let the model auto-detect
            (supports mixed-language audio).
          example: en
        response_format:
          type: string
          description: Output format. Defaults to `json`.
          default: json
          enum: [json, text, srt, verbose_json, vtt]
    TranscriptionResponse:
      type: object
      description: >-
        JSON transcript. Shape follows the underlying model; `segments` and
        timestamp detail are present for verbose formats.
      properties:
        text:
          type: string
          description: The full transcript.
        language:
          type: string
          description: Detected or supplied language.
        duration:
          type: number
          description: Audio duration in seconds, when reported.
        segments:
          type: array
          description: Per-segment breakdown with timestamps, when available.
          items:
            $ref: '#/components/schemas/TranscriptionSegment'
    TranscriptionSegment:
      type: object
      description: A timestamped transcript segment.
      properties:
        id:
          type: integer
        start:
          type: number
          description: Segment start time in seconds.
        end:
          type: number
          description: Segment end time in seconds.
        text:
          type: string
    SpeechRequest:
      type: object
      required: [input]
      properties:
        input:
          type: string
          description: Text to synthesize into speech.
        model:
          type: string
          description: >-
            TTS model (provider-prefixed, e.g. `gemini/gemini-2.5-flash-tts`).
            Overrides the server default for this call.
          example: gemini/gemini-2.5-flash-tts
        voice:
          type: string
          description: >-
            Voice name. Must belong to the same provider as `model` (e.g.
            Gemini voices such as `Kore` for the default Gemini TTS model).
            Defaults to the server-configured voice when omitted.
          example: Kore
        response_format:
          type: string
          description: >-
            Audio container/codec. Defaults to `mp3` (`audio/mpeg` body).
          default: mp3
          example: mp3
    ImageGenerationRequest:
      type: object
      required: [model, prompt]
      description: >-
        Forwarded verbatim to the image model; additional provider-specific
        fields are accepted and passed through.
      additionalProperties: true
      properties:
        model:
          type: string
          description: Image model, provider-prefixed.
          example: Alibaba/z-image-turbo
        prompt:
          type: string
          description: Text description of the desired image(s).
        n:
          type: integer
          description: Number of images to generate.
          default: 1
        size:
          type: string
          description: Requested image dimensions.
          example: 1024x1024
        response_format:
          type: string
          description: How images are returned.
          enum: [url, b64_json]
    ImageEditRequest:
      type: object
      required: [model, image, prompt]
      description: >-
        Multipart body forwarded verbatim to the image model; additional
        provider-specific fields are accepted.
      properties:
        model:
          type: string
          description: Image model, provider-prefixed.
          example: Alibaba/z-image-turbo
        image:
          type: string
          format: binary
          description: Source image to edit.
        mask:
          type: string
          format: binary
          description: >-
            Optional mask; transparent areas indicate where the image should be
            edited.
        prompt:
          type: string
          description: Text description of the desired edit.
        n:
          type: integer
          default: 1
        size:
          type: string
          example: 1024x1024
        response_format:
          type: string
          enum: [url, b64_json]
    ImageVariationRequest:
      type: object
      required: [model, image]
      description: >-
        Multipart body forwarded verbatim to the image model; additional
        provider-specific fields are accepted.
      properties:
        model:
          type: string
          description: Image model, provider-prefixed.
          example: Alibaba/z-image-turbo
        image:
          type: string
          format: binary
          description: Source image to create variations of.
        n:
          type: integer
          default: 1
        size:
          type: string
          example: 1024x1024
        response_format:
          type: string
          enum: [url, b64_json]
    ImageResponse:
      type: object
      description: >-
        OpenAI-compatible image response, returned unchanged from the model.
      properties:
        created:
          type: integer
          description: Unix timestamp of generation.
        data:
          type: array
          items:
            $ref: '#/components/schemas/ImageData'
    ImageData:
      type: object
      description: A single generated image, per the requested `response_format`.
      properties:
        url:
          type: string
          description: Image URL (when `response_format=url`).
        b64_json:
          type: string
          description: Base64-encoded image (when `response_format=b64_json`).
        revised_prompt:
          type: string
          description: Prompt as revised by the model, when provided.
    # ---- docs ----
    OcrRequest:
      type: object
      description: JSON alternative to the multipart upload for OCR.
      required: [file_base64]
      properties:
        file_base64:
          type: string
          description: Base64-encoded PDF bytes.
        file_sha256:
          type: string
          description: Optional caller-supplied SHA-256 of the file, used as the result-cache key.
        options:
          type: object
          properties:
            max_pages:
              type: integer
              description: Optional cap on pages to process (0 or omitted = all pages).
    OcrResponse:
      type: object
      properties:
        markdown:
          type: string
          description: The extracted document text as markdown.
        page_count:
          type: integer
          description: Number of pages processed.
        model_used:
          type: string
          description: Vision model that produced the result.
        fallback_chain_triggered:
          type: boolean
          description: True if a fallback vision model was used for one or more pages.
        cost_usd:
          type: number
          description: Billed cost of this OCR call in USD.
        cache_hit:
          type: boolean
          description: True when the result was served from cache (no new billing).
        elapsed_ms:
          type: integer
          description: Server-side processing time in milliseconds.
    ExtractRequest:
      type: object
      description: JSON alternative to the multipart upload for text extraction.
      required: [file_base64, filename]
      properties:
        file_base64:
          type: string
          description: Base64-encoded document bytes.
        filename:
          type: string
          description: Filename with a supported extension, used to route the parser.
    ExtractResponse:
      type: object
      properties:
        text:
          type: string
          description: The extracted plain text.
        title:
          type: string
          description: Document title when the parser can detect one.
        doc_type:
          type: string
          description: Detected document type (e.g. docx, xlsx, pdf, odt, csv, eml).
        char_count:
          type: integer
          description: Length of the extracted text in characters.
        elapsed_ms:
          type: integer
          description: Server-side processing time in milliseconds.
    MemoryLog:
      type: object
      properties:
        agent_id:
          type: string
          description: The persona this memory belongs to.
        scope:
          type: string
          enum: [corporate, personal]
          description: The memory scope that was read.
        content:
          type: string
          description: The accumulated memory as text. Empty when nothing has been remembered yet.
        updated_at:
          type: string
          format: date-time
          description: When the memory log was last written.
        enabled:
          type: boolean
          description: False when observational memory is not active on this deployment.
        last_observed_at:
          type: string
          format: date-time
          description: When new activity was last folded into memory. Omitted when never observed.
    KnowledgeSignalList:
      type: object
      properties:
        signals:
          type: array
          items: { $ref: '#/components/schemas/KnowledgeSignal' }
        total:
          type: integer
          description: Number of signals returned.
    KnowledgeSignal:
      type: object
      properties:
        id:
          type: string
        tenant:
          type: string
        app:
          type: string
          description: Source application that captured the signal.
        employee_id:
          type: string
          description: Persona associated with the signal.
        type:
          type: string
          description: Signal type.
        fact_key:
          type: string
          description: Normalised dedupe key identifying the same fact across signals.
        content:
          type: string
          description: The captured fact text.
        source_chunk_id:
          type: string
          description: Identifier of the source chunk the signal was derived from.
        status:
          type: string
          enum: [pending, quarantined, eligible, promoted, rejected, superseded]
        created_at:
          type: string
          format: date-time
        signature:
          type: string
          description: Integrity signature over the signal contents.
    PromotionCandidates:
      type: object
      properties:
        fact_keys:
          type: array
          description: Fact keys that have cleared the promotion quorum.
          items: { type: string }
    # ---- files ----
    FileObject:
      type: object
      description: An uploaded file, OpenAI Files API compatible.
      required: [id, object, bytes, created_at, filename]
      properties:
        id:
          type: string
          description: File identifier, prefixed with `file-`.
        object:
          type: string
          const: file
        bytes:
          type: integer
          description: Size of the file in bytes.
        created_at:
          type: integer
          description: Unix timestamp (seconds) of creation.
        filename:
          type: string
        purpose:
          type: string
          description: Intended use of the file.
        status:
          type: string
          description: Processing status, e.g. `processed`.
        status_details:
          type: string
          nullable: true
    FileDeleted:
      type: object
      required: [id, object, deleted]
      properties:
        id: { type: string }
        object:
          type: string
          const: file
        deleted:
          type: boolean
    Conversation:
      type: object
      description: Per-user conversation summary.
      required: [id, agent_id, created_at, last_active_at, message_count]
      properties:
        id: { type: string }
        agent_id: { type: string }
        title:
          type: string
          nullable: true
          description: Null until set via rename.
        created_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
        message_count:
          type: integer
        metadata:
          type: object
          additionalProperties: true
          description: App-owned metadata map. Omitted when empty.
    ConversationDetail:
      type: object
      description: Conversation summary plus its message log.
      required: [id, agent_id, created_at, last_active_at, message_count, messages]
      properties:
        id: { type: string }
        agent_id: { type: string }
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        last_active_at:
          type: string
          format: date-time
        message_count:
          type: integer
        messages:
          type: array
          items: { $ref: '#/components/schemas/ConversationMessage' }
        metadata:
          type: object
          additionalProperties: true
          description: Omitted when empty.
    ConversationMessage:
      type: object
      required: [role, content, timestamp]
      properties:
        role:
          type: string
          description: e.g. `user`, `assistant`.
        content:
          type: string
        timestamp:
          type: string
          format: date-time
    ConversationList:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
    ConversationCreate:
      type: object
      properties:
        id:
          type: string
          description: Client-chosen id. Server generates one when omitted.
        agent_id:
          type: string
        metadata:
          type: object
          additionalProperties: true
          description: >-
            App-owned metadata. Reserved `nova_` key prefix rejected; capped
            at 4 KB serialized.
    ConversationDeleted:
      type: object
      required: [id, deleted]
      properties:
        id: { type: string }
        deleted:
          type: boolean
    Attachment:
      type: object
      description: A file attached to a conversation.
      required: [id, name, mime_type, size_bytes, download_url, created_at, scan_status]
      properties:
        id: { type: string }
        name:
          type: string
          description: Original filename.
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        download_url:
          type: string
          description: Relative URL for downloading the attachment bytes.
        created_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        scan_status:
          type: string
          description: Malware-scan status, e.g. `not_scanned`.
    # ---- governance ----
    PendingAction:
      type: object
      description: A side-effecting action parked for human approval.
      properties:
        id: { type: string }
        agent_id: { type: string }
        user_id: { type: string }
        tenant_id: { type: string }
        session_id: { type: string }
        tool_name: { type: string }
        risk:
          type: string
          description: Effective risk tier; an unknown/absent value fails safe to `high`.
          enum: [low, medium, high]
        status:
          type: string
          enum: [pending, approved, rejected, executed, failed]
        result:
          type: string
          description: Terminal outcome detail (e.g. execution error); omitted when empty.
        created_at: { type: string, format: date-time }
        decided_at: { type: string, format: date-time }
        input:
          description: The tool arguments, forwarded as structured JSON.
          type: object
          additionalProperties: true
        preview:
          description: Dry-run preview of the action's effect, if computed.
          type: object
          additionalProperties: true
        source:
          type: string
          description: Connector queue label (connector-sourced actions).
        external_ref:
          type: string
          description: Connector correlation key.
        group_id:
          type: string
          description: Owning group; empty means admin-only.
        claimed_by:
          type: string
          description: User id that soft-claimed the action.
        decided_by:
          type: string
          description: User id that approved or rejected the action.
        reason:
          type: string
          description: Why the action was approved or rejected.
      required: [id, tool_name, risk, status, created_at]
    ActionEnvelope:
      type: object
      properties:
        action: { $ref: '#/components/schemas/PendingAction' }
      required: [action]
    ActionList:
      type: object
      properties:
        actions:
          type: array
          items: { $ref: '#/components/schemas/PendingAction' }
      required: [actions]
    ActionCallback:
      type: object
      description: >-
        Webhook fired when the action is approved. It is snapshotted onto the
        row and never surfaced back to clients.
      properties:
        url:
          type: string
          format: uri
          description: The webhook endpoint the approved action is dispatched to.
        auth:
          type: object
          properties:
            type: { type: string }
            secret_ref:
              type: string
              description: >-
                Name of an environment variable on the Nova OS server holding
                the shared HMAC secret. The secret itself never travels in the
                request or the stored row.
          required: [secret_ref]
        timeout_sec: { type: integer }
        retry: { type: integer }
      required: [url, auth]
    CreateActionRequest:
      type: object
      description: Body for a connector parking an action for approval.
      properties:
        agent_id: { type: string }
        user_id: { type: string }
        tenant_id: { type: string }
        session_id: { type: string }
        group_id:
          type: string
          description: Route the action to a departmental group queue.
        tool_name: { type: string }
        input:
          description: The tool arguments.
          type: object
          additionalProperties: true
        preview:
          description: Optional dry-run preview of the effect.
          type: object
          additionalProperties: true
        risk:
          type: string
          description: Effective risk tier; absent/unknown fails safe to `high`.
          enum: [low, medium, high]
        source: { type: string }
        external_ref: { type: string }
        callback: { $ref: '#/components/schemas/ActionCallback' }
      required: [tool_name, input, source, callback]
    ActionDecisionRequest:
      type: object
      description: Optional body carrying an approve/reject reason for the audit trail.
      properties:
        reason: { type: string }
    Group:
      type: object
      description: A role-carrying group that gates departmental action queues.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        members:
          type: array
          items: { $ref: '#/components/schemas/GroupMember' }
      required: [id, name, created_at, updated_at]
    GroupEnvelope:
      type: object
      properties:
        group: { $ref: '#/components/schemas/Group' }
      required: [group]
    GroupList:
      type: object
      properties:
        groups:
          type: array
          items: { $ref: '#/components/schemas/Group' }
      required: [groups]
    GroupRole:
      type: string
      description: A member's role in a group.
      enum: [member, approver, lead]
    GroupMember:
      type: object
      properties:
        user_id: { type: string }
        role: { $ref: '#/components/schemas/GroupRole' }
        created_at: { type: string, format: date-time }
      required: [user_id, role]
    CreateGroupRequest:
      type: object
      properties:
        id:
          type: string
          description: Optional; derived from `name` as a kebab-case slug when omitted.
        tenant_id: { type: string }
        name: { type: string }
        description: { type: string }
      required: [name]
    AddGroupMemberRequest:
      type: object
      properties:
        user_id: { type: string }
        role: { $ref: '#/components/schemas/GroupRole' }
      required: [user_id]
    MyGroupMembership:
      type: object
      description: One of the caller's own group memberships.
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        role: { $ref: '#/components/schemas/GroupRole' }
      required: [id, name, role]
    MyGroupList:
      type: object
      properties:
        groups:
          type: array
          items: { $ref: '#/components/schemas/MyGroupMembership' }
      required: [groups]
    FieldTier:
      type: string
      description: A read or write access level over a record's fields.
      enum: [all, non-sensitive, none]
    FieldRule:
      type: object
      description: Maps a role to its read/write tiers.
      properties:
        role: { type: string }
        read: { $ref: '#/components/schemas/FieldTier' }
        write: { $ref: '#/components/schemas/FieldTier' }
      required: [role, read, write]
    FieldOwnerOverride:
      type: object
      description: >-
        Raises (never lowers) the caller's tiers when the caller owns the
        record. An empty tier leaves the corresponding tier unchanged.
      properties:
        read: { $ref: '#/components/schemas/FieldTier' }
        write: { $ref: '#/components/schemas/FieldTier' }
    FieldPolicy:
      type: object
      description: Declarative per-(tenant, record type) field-access policy.
      properties:
        sensitiveFields:
          type: array
          items: { type: string }
        rules:
          type: array
          items: { $ref: '#/components/schemas/FieldRule' }
        ownerOverride: { $ref: '#/components/schemas/FieldOwnerOverride' }
        defaultRead:
          allOf: [ { $ref: '#/components/schemas/FieldTier' } ]
          description: Tier for a role not in `rules`; empty defaults to `non-sensitive`.
        defaultWrite:
          allOf: [ { $ref: '#/components/schemas/FieldTier' } ]
          description: Tier for a role not in `rules`; empty defaults to `none`.
    FieldPolicyList:
      type: object
      description: The tenant's policies keyed by record type.
      properties:
        policies:
          type: object
          additionalProperties: { $ref: '#/components/schemas/FieldPolicy' }
      required: [policies]
    FieldCaller:
      type: object
      description: The identity evaluated against a policy.
      properties:
        role: { type: string }
        id: { type: string }
      required: [role]
    FieldAccess:
      type: object
      description: >-
        The computed access contract. An omitted field list means "all fields";
        a present list (including empty) is the explicit permitted set.
      properties:
        visibleFields:
          type: array
          items: { type: string }
        writableFields:
          type: array
          items: { type: string }
    FieldEvaluateRequest:
      type: object
      properties:
        caller: { $ref: '#/components/schemas/FieldCaller' }
        record:
          type: object
          properties:
            owner: { type: string }
            id: { type: string }
            fields:
              type: object
              additionalProperties: true
          required: [fields]
        mode:
          type: string
          description: Empty for a read evaluation, `write` for a write evaluation.
          enum: ['', write]
      required: [caller, record]
    FieldEvaluateResponse:
      type: object
      description: >-
        The access decision plus the enforced record view. Read mode returns
        `stripped`; write mode returns `filtered`.
      properties:
        _access: { $ref: '#/components/schemas/FieldAccess' }
        stripped:
          type: object
          additionalProperties: true
        filtered:
          type: object
          additionalProperties: true
      required: [_access]
    FieldAccessEvent:
      type: object
      description: An append-only audit record of sensitive-field access.
      properties:
        tenant: { type: string }
        record_type: { type: string }
        record_id: { type: string }
        field: { type: string }
        action:
          type: string
          description: The audited action (e.g. `read_strip`).
        actor: { type: string }
        at: { type: string, format: date-time }
    FieldAccessEventList:
      type: object
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/FieldAccessEvent' }
      required: [events]
    # ---- connectors ----
    Connector:
      type: object
      description: A connector configuration with secret values masked; secret_keys lists which secrets are set.
      properties:
        kind:
          type: string
          description: Connector kind identifier.
        tenant_id:
          type: string
          description: Owning tenant; omitted when unscoped.
        enabled:
          type: boolean
        group_id:
          type: string
          description: Optional group scoping the connector.
        config:
          type: object
          additionalProperties: true
          description: Connector-specific non-secret settings.
        secret_keys:
          type: array
          description: Names of the secrets that are set; values are never returned here.
          items: { type: string }
        updated_at:
          type: string
          format: date-time
      required: [kind, enabled, config, secret_keys, updated_at]
    ConnectorList:
      type: object
      properties:
        connectors:
          type: array
          items: { $ref: '#/components/schemas/Connector' }
      required: [connectors]
    ConnectorUpsert:
      type: object
      description: Upsert payload for a connector's settings and secrets.
      properties:
        tenant_id:
          type: string
        enabled:
          type: boolean
        group_id:
          type: string
        config:
          type: object
          additionalProperties: true
          description: Connector-specific non-secret settings (must be a JSON object).
        secrets:
          type: object
          additionalProperties: { type: string }
          description: >-
            Secret values to merge. A non-empty value overwrites, an empty string
            deletes that key, and omitted keys are preserved.
    ConnectorCredentials:
      type: object
      description: A connector config together with its decrypted secret values.
      properties:
        connector: { $ref: '#/components/schemas/Connector' }
        secrets:
          type: object
          additionalProperties: { type: string }
          description: Decrypted secret values keyed by secret name.
      required: [connector, secrets]
    SyncStatus:
      type: object
      description: SharePoint sync worker status snapshot.
      properties:
        configured: { type: boolean }
        enabled: { type: boolean }
        collection_id: { type: string }
        last_sync_at:
          type: string
          format: date-time
        last_error: { type: string }
        items_synced: { type: integer }
        items_deleted: { type: integer }
        items_failed: { type: integer }
        items_skipped: { type: integer }
        cycles_run: { type: integer }
        has_delta_link:
          type: boolean
          description: Whether a delta resume link is persisted.
        resume_pending:
          type: boolean
          description: True when the last cycle stopped at the item cap and the next cycle resumes the same delta round.
      required: [configured, enabled, last_sync_at, items_synced, items_deleted, items_failed, items_skipped, cycles_run, has_delta_link, resume_pending]
    HouseProfile:
      type: object
      description: An employee's house-profile markdown and its last-updated timestamp.
      properties:
        markdown:
          type: string
          description: The house-profile content, in markdown.
        updated_at:
          type: string
          format: date-time
          description: Last-updated timestamp; empty when no profile is set.
      required: [markdown, updated_at]
    HouseProfileUpdate:
      type: object
      description: Replacement house-profile content. An empty markdown string clears the profile.
      properties:
        markdown:
          type: string
      required: [markdown]
    Entitlements:
      type: object
      description: A tenant's effective entitlement flag map.
      properties:
        tenant_id:
          type: string
        flags:
          type: object
          additionalProperties: true
          description: Effective flag values (free floor overlaid with stored overrides).
      required: [tenant_id, flags]
    EntitlementsEnvelope:
      type: object
      properties:
        entitlements: { $ref: '#/components/schemas/Entitlements' }
      required: [entitlements]
    EntitlementsUpdate:
      type: object
      description: Upsert payload for a tenant's entitlement flags.
      properties:
        flags:
          type: object
          additionalProperties: true
      required: [flags]
    # ---- auth ----
    OidcDiscovery:
      type: object
      description: OpenID Connect discovery metadata.
      properties:
        issuer: { type: string, format: uri }
        authorization_endpoint: { type: string, format: uri }
        token_endpoint: { type: string, format: uri }
        userinfo_endpoint: { type: string, format: uri }
        jwks_uri: { type: string, format: uri }
        response_types_supported:
          type: array
          items: { type: string }
        subject_types_supported:
          type: array
          items: { type: string }
        id_token_signing_alg_values_supported:
          type: array
          items: { type: string }
        scopes_supported:
          type: array
          items: { type: string }
        grant_types_supported:
          type: array
          items: { type: string }
        token_endpoint_auth_methods_supported:
          type: array
          items: { type: string }
    OauthError:
      type: object
      description: OAuth 2.0 error response.
      properties:
        error:
          type: string
          description: >-
            Error code, e.g. `invalid_client`, `invalid_grant`,
            `redirect_uri_mismatch`, `pkce_required`, `pkce_mismatch`,
            `invalid_scope`, `unsupported_grant_type`, `unknown_provider`.
      required: [error]
    TokenRequest:
      type: object
      description: >-
        Token request. Required fields depend on `grant_type`:
        `authorization_code` uses code/redirect_uri/(code_verifier);
        `refresh_token` uses refresh_token/(scope);
        `client_credentials` uses client_id/client_secret.
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token, client_credentials]
        client_id: { type: string }
        client_secret: { type: string }
        code: { type: string }
        redirect_uri: { type: string, format: uri }
        code_verifier: { type: string, description: PKCE verifier. }
        refresh_token: { type: string }
        scope: { type: string, description: Space-delimited. }
      required: [grant_type]
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        id_token:
          type: string
          description: HS256 id token (present for the authorization_code / refresh_token grants).
        expires_in: { type: integer, example: 3600 }
        refresh_token:
          type: string
          description: Present when the `offline_access` scope was granted, and always on a refresh_token rotation.
      required: [access_token, token_type, expires_in]
    UserInfo:
      type: object
      properties:
        sub: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          description: Deprecated singular mirror of the highest role in `roles`.
        tenant_id: { type: string }
        roles:
          type: array
          items: { type: string }
    OidcClient:
      type: object
      properties:
        client_id: { type: string }
        redirect_uri: { type: string, format: uri }
        app_id: { type: string }
    ScimName:
      type: object
      properties:
        formatted: { type: string }
        givenName: { type: string }
        familyName: { type: string }
    ScimEmail:
      type: object
      properties:
        value: { type: string, format: email }
        type: { type: string, example: work }
        primary: { type: boolean }
      required: [value]
    ScimMeta:
      type: object
      properties:
        resourceType: { type: string, example: User }
        created: { type: string, format: date-time }
        lastModified: { type: string, format: date-time }
        location: { type: string }
    ScimUser:
      type: object
      description: SCIM 2.0 core User resource (RFC 7643), restricted to the supported attributes.
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:schemas:core:2.0:User']
        id: { type: string }
        externalId: { type: string }
        userName:
          type: string
          format: email
          description: The user's email; unique.
        name: { $ref: '#/components/schemas/ScimName' }
        displayName: { type: string }
        active: { type: boolean }
        emails:
          type: array
          items: { $ref: '#/components/schemas/ScimEmail' }
        meta: { $ref: '#/components/schemas/ScimMeta' }
      required: [userName]
    ScimListResponse:
      type: object
      description: SCIM ListResponse envelope.
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:api:messages:2.0:ListResponse']
        totalResults: { type: integer }
        startIndex: { type: integer }
        itemsPerPage: { type: integer }
        Resources:
          type: array
          items: { $ref: '#/components/schemas/ScimUser' }
    ScimPatchOp:
      type: object
      description: SCIM PatchOp request (RFC 7644 §3.5.2).
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:api:messages:2.0:PatchOp']
        Operations:
          type: array
          items:
            type: object
            properties:
              op:
                type: string
                enum: [add, replace, remove]
              path: { type: string }
              value:
                description: >-
                  Attribute value; a bare value, an object, or (for `emails`) an
                  array. Boolean `active` also accepts the string `"True"`/`"False"`.
            required: [op]
      required: [Operations]
    ScimError:
      type: object
      description: SCIM error response (RFC 7644 §3.12). `status` is a string.
      properties:
        schemas:
          type: array
          items: { type: string }
          example: ['urn:ietf:params:scim:api:messages:2.0:Error']
        status: { type: string, example: '404' }
        scimType:
          type: string
          description: 'e.g. `invalidFilter`, `invalidValue`, `invalidSyntax`, `uniqueness`.'
        detail: { type: string }
    CreateServiceKeyRequest:
      type: object
      properties:
        name: { type: string }
        expires_in_days:
          type: integer
          minimum: 1
          description: Optional expiry in days; omit for a non-expiring key.
    ServiceKey:
      type: object
      description: Service API key metadata (no secret).
      properties:
        id: { type: string }
        key_prefix: { type: string, example: nk_Ng9IdeX4S }
        name: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    ServiceKeyList:
      type: object
      properties:
        keys:
          type: array
          items: { $ref: '#/components/schemas/ServiceKey' }
    ServiceKeySecret:
      type: object
      description: One-time mint response carrying the full secret. Store it immediately; it is never recoverable.
      properties:
        id: { type: string }
        key_prefix: { type: string, example: nk_Ng9IdeX4S }
        secret:
          type: string
          description: The full `nk_` key. Returned only once.
        name: { type: string }
        created_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }
    AgentKey:
      type: object
      description: One-time mint response for a per-agent key carrying the full secret.
      properties:
        id: { type: string }
        key_prefix: { type: string, example: nk_Ng9IdeX4S }
        secret:
          type: string
          description: The full `nk_` key. Returned only once.
        name: { type: string }
        created_at: { type: string, format: date-time }
    # ---- opsapps ----
    App:
      type: object
      description: One installed app.
      properties:
        name: { type: string }
        version: { type: string }
        schema_prefix: { type: string }
        manifest_path: { type: string }
        status: { type: string }
        installed_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time, nullable: true }
        archived_by: { type: string, nullable: true }
        last_error: { type: string, nullable: true }
        agents_count: { type: integer }
      required: [name, version, schema_prefix, manifest_path, status, installed_at, last_seen_at, agents_count]
    AppList:
      type: object
      properties:
        apps:
          type: array
          items: { $ref: '#/components/schemas/App' }
      required: [apps]
    AppAgent:
      type: object
      description: Minimal app-scoped agent summary.
      properties:
        id: { type: string }
        capabilities:
          type: array
          items: { type: string }
      required: [id, capabilities]
    AppAgentList:
      type: object
      properties:
        agents:
          type: array
          items: { $ref: '#/components/schemas/AppAgent' }
      required: [agents]
    AppMigration:
      type: object
      description: One schema-migration audit row for an app.
      properties:
        filename: { type: string }
        checksum: { type: string }
        status: { type: string, enum: [applied, failed] }
        applied_at: { type: string, format: date-time }
        error_message: { type: string, nullable: true, description: Null when status is applied. }
      required: [filename, checksum, status, applied_at, error_message]
    AppMigrationList:
      type: object
      properties:
        app: { type: string }
        migrations:
          type: array
          items: { $ref: '#/components/schemas/AppMigration' }
      required: [app, migrations]
    AppInstallResult:
      type: object
      description: Result of an install, reload, or uninstall operation.
      properties:
        name: { type: string }
        version: { type: string }
        registered: { type: boolean }
        agents_registered: { type: integer }
        agents_unregistered: { type: integer }
        migrations_applied: { type: integer }
        status: { type: string }
        errors:
          type: array
          description: Present only when the operation failed.
          items: { type: string }
      required: [name, version, registered, agents_registered, agents_unregistered, migrations_applied]
    McpRequest:
      type: object
      description: JSON-RPC 2.0 request envelope.
      properties:
        jsonrpc: { type: string, enum: ['2.0'] }
        id:
          description: 'JSON-RPC request id (string, number, or null), echoed on the response.'
        method:
          type: string
          description: One of initialize, tools/list, tools/call, resources/list, resources/read.
        params:
          type: object
          description: Method-specific parameters.
          additionalProperties: true
      required: [jsonrpc, method]
    McpResponse:
      type: object
      description: JSON-RPC 2.0 response envelope. Exactly one of result or error is present.
      properties:
        jsonrpc: { type: string, enum: ['2.0'] }
        id:
          description: 'JSON-RPC request id (string, number, or null), echoed on the response.'
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          properties:
            code: { type: integer }
            message: { type: string }
          required: [code, message]
      required: [jsonrpc, id]
    SkillRunResponse:
      type: object
      properties:
        output:
          type: string
          description: Raw string returned by the tool handler.
      required: [output]
    FeatureStatus:
      type: object
      description: Resolved state of one gated feature.
      properties:
        name: { type: string }
        state: { type: string, enum: [on, off, degraded] }
        resolved_from: { type: string, enum: [env, setting, default] }
        flag: { type: string }
        reason: { type: string }
        runtime_mutable: { type: boolean }
      required: [name, state, resolved_from]
    FeatureList:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        features:
          type: array
          items: { $ref: '#/components/schemas/FeatureStatus' }
      required: [generated_at, features]
    InfraHealth:
      type: object
      description: Aggregated infrastructure-health signals over the requested window.
      properties:
        window_since: { type: string, format: date-time }
        error_clusters:
          type: array
          items: { $ref: '#/components/schemas/InfraErrorCluster' }
        tool_errors:
          type: array
          items: { $ref: '#/components/schemas/InfraToolError' }
        latency:
          type: array
          items: { $ref: '#/components/schemas/InfraLatencyStat' }
        identity_errors:
          type: array
          items: { $ref: '#/components/schemas/InfraErrorCluster' }
        grounding_outcomes: { $ref: '#/components/schemas/InfraGroundingCounts' }
      required: [window_since, error_clusters, tool_errors, latency, identity_errors, grounding_outcomes]
    InfraErrorCluster:
      type: object
      properties:
        pattern: { type: string }
        count: { type: integer }
        sample: { type: string }
        top_agents: { type: array, items: { type: string } }
        top_models: { type: array, items: { type: string } }
        top_providers: { type: array, items: { type: string } }
        first_seen: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }
      required: [pattern, count, sample, first_seen, last_seen]
    InfraToolError:
      type: object
      properties:
        tool: { type: string }
        invocations: { type: integer }
        errored_turns: { type: integer }
        errored_turn_rate: { type: number }
        sample_errors: { type: array, items: { type: string } }
      required: [tool, invocations, errored_turns, errored_turn_rate]
    InfraLatencyStat:
      type: object
      properties:
        model: { type: string }
        provider: { type: string }
        p50_ms: { type: integer }
        p95_ms: { type: integer }
        p99_ms: { type: integer }
        n: { type: integer }
      required: [model, provider, p50_ms, p95_ms, p99_ms, n]
    InfraGroundingCounts:
      type: object
      properties:
        grounded: { type: integer }
        ungrounded_refusal: { type: integer }
        ungrounded_no_chunks: { type: integer }
        degraded: { type: integer }
        unknown: { type: integer }
      required: [grounded, ungrounded_refusal, ungrounded_no_chunks, degraded, unknown]
    LogEntry:
      type: object
      description: One log row. Stable across both sources.
      properties:
        ts: { type: string, format: date-time }
        level: { type: string }
        msg: { type: string }
        fields:
          type: object
          additionalProperties: true
        request_id:
          type: string
          description: Set only on source=requests rows.
      required: [ts, level, msg]
    LogList:
      type: object
      properties:
        logs:
          type: array
          items: { $ref: '#/components/schemas/LogEntry' }
        next_cursor: { type: string }
        source: { type: string, enum: [server, requests] }
        total_in_buffer: { type: integer }
      required: [logs, source, total_in_buffer]
  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Token valid but lacks permission for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found (or hidden from this token's scope).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UpgradeRequired:
      description: SDK or OpenAPI hash major mismatch.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /v1/agents:
    post:
      operationId: createAgent
      summary: Create an agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreate'
      responses:
        '201':
          description: Agent created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
    get:
      operationId: listAgents
      summary: List agents
      tags: [Agents]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: owner
          schema: { type: string }
          description: Filter to agents owned by this email.
      responses:
        '200':
          description: Agent list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/agents/{agent_id}:
    parameters:
      - in: path
        name: agent_id
        required: true
        schema: { type: string }
    get:
      operationId: getAgent
      summary: Get an agent
      tags: [Agents]
      responses:
        '200':
          description: Agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateAgent
      summary: Update an agent (partial)
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdate'
      responses:
        '200':
          description: Updated agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteAgent
      summary: Delete an agent
      tags: [Agents]
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/agents/schema:
    get:
      operationId: getAgentSchema
      summary: Get the AgentDef JSON Schema
      tags: [Agents]
      responses:
        '200':
          description: AgentDef JSON Schema.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '426': { $ref: '#/components/responses/UpgradeRequired' }

  /v1/messages:
    post:
      operationId: createMessage
      summary: Send an Anthropic-compatible message
      description: |
        Route to a Nova OS agent via `metadata.agent_id`; omit for the default agent.

        When `stream:false`, returns a single `MessageResponse`.
        When `stream:true`, returns SSE with one `event:` line + JSON
        payload per event. Event types defined by `StreamEvent`.
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
      responses:
        '200':
          description: Message response (non-stream) or SSE stream.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '426': { $ref: '#/components/responses/UpgradeRequired' }

  /v1/managed/agents/messages/{message_id}/custom_tool_results:
    parameters:
      - in: path
        name: message_id
        required: true
        schema: { type: string }
    post:
      operationId: submitCustomToolResult
      summary: Submit a custom_tool_use result (Mode A inline)
      description: |
        Used when partner consumes the SSE stream directly. POST the result
        for an emitted `custom_tool_use` event; Nova OS resumes the agent
        loop and continues streaming on the original request connection.
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomToolResultRequest'
      responses:
        '202':
          description: Result accepted; streaming resumes on the original connection.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/employees:
    post:
      operationId: createEmployee
      summary: Create an employee
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
      responses:
        '201':
          description: Employee created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      operationId: listEmployees
      summary: List employees
      tags: [Employees]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Employee list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/employees/{employee_id}:
    parameters:
      - in: path
        name: employee_id
        required: true
        schema: { type: string }
    get:
      operationId: getEmployee
      summary: Get an employee
      tags: [Employees]
      responses:
        '200':
          description: Employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateEmployee
      summary: Update an employee (partial)
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
      responses:
        '200':
          description: Updated employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteEmployee
      summary: Delete an employee
      tags: [Employees]
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/employees/{employee_id}/bundle/export:
    parameters:
      - in: path
        name: employee_id
        required: true
        schema: { type: string }
    get:
      operationId: exportEmployeeBundle
      summary: Download a portable .nova-bundle.zip
      tags: [Employees]
      parameters:
        - in: query
          name: include_knowledge
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Zip bundle.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/employees/bundle/import:
    post:
      operationId: importEmployeeBundle
      summary: Import a .nova-bundle.zip
      tags: [Employees]
      parameters:
        - in: query
          name: on_conflict
          schema:
            type: string
            enum: [overwrite, skip, error]
            default: error
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Imported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleImportResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Conflict — existing employee with same id and `on_conflict=error`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/managed/agents/jobs:
    post:
      operationId: createJob
      summary: Submit an async agent run
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
      responses:
        '202':
          description: Job queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      operationId: listJobs
      summary: List jobs
      tags: [Jobs]
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/JobStatus'
        - in: query
          name: agent_id
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Job list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/agents/jobs/{job_id}:
    parameters:
      - in: path
        name: job_id
        required: true
        schema: { type: string }
    get:
      operationId: getJob
      summary: Get a job
      tags: [Jobs]
      responses:
        '200':
          description: Job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: cancelJob
      summary: Cancel a job (graceful drain)
      tags: [Jobs]
      responses:
        '202':
          description: Cancellation accepted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/agents/jobs/{job_id}/stream:
    parameters:
      - in: path
        name: job_id
        required: true
        schema: { type: string }
      - in: header
        name: Last-Event-ID
        schema: { type: string }
        description: Resume from event seq — replays missed events from PG before live broadcast.
    get:
      operationId: streamJob
      summary: SSE stream for an async job (with replay)
      tags: [Jobs]
      responses:
        '200':
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Documents (#175) ────────────────────────────────────────────────
  /v1/managed/documents:
    get:
      operationId: listDocuments
      summary: List documents in a collection
      tags: [Documents]
      parameters:
        - in: query
          name: collection_id
          schema: { type: string }
          description: Collection to enumerate; empty = root.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Document list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/documents/upload:
    post:
      operationId: uploadDocument
      summary: Upload a document
      tags: [Documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                collection_id:
                  type: string
                  description: Target collection; empty = root.
      responses:
        '201':
          description: Document uploaded and auto-indexed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/documents/{document_id}:
    parameters:
      - in: path
        name: document_id
        required: true
        schema: { type: string }
    delete:
      operationId: deleteDocument
      summary: Delete a document
      tags: [Documents]
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Knowledge (#176) ────────────────────────────────────────────────
  /v1/managed/knowledge/search:
    post:
      operationId: searchKnowledge
      summary: Hybrid search across the knowledge base
      tags: [Knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KnowledgeSearchRequest' }
      responses:
        '200':
          description: Ranked passages.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeSearchResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/managed/knowledge/ingest:
    post:
      operationId: ingestKnowledge
      summary: Ingest a document into a knowledge collection
      tags: [Knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KnowledgeIngestRequest' }
      responses:
        '201':
          description: Document ingested.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ingested] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/managed/knowledge/collections:
    get:
      operationId: listKnowledgeCollections
      summary: List every knowledge collection
      tags: [Knowledge]
      responses:
        '200':
          description: Collection name list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeCollectionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Hooks (#177) ────────────────────────────────────────────────────
  /v1/managed/hooks:
    get:
      operationId: listHooks
      summary: List lifecycle-hook subscriptions
      tags: [Hooks]
      responses:
        '200':
          description: Subscription list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HookSubscriptionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createHook
      summary: Register a lifecycle-hook subscription
      tags: [Hooks]
      description: |
        Note: as of v0.1.5 the in-memory store accepts subscriptions but
        the runtime hook bus does not yet bridge to it. Persistence and
        bus bridge land in a follow-up; partners wiring integrations now
        get a stable contract.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HookSubscriptionCreate' }
      responses:
        '201':
          description: Subscription created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HookSubscription' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/hooks/{hook_id}:
    parameters:
      - in: path
        name: hook_id
        required: true
        schema: { type: string }
    get:
      operationId: getHook
      summary: Get a hook subscription
      tags: [Hooks]
      responses:
        '200':
          description: Subscription.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HookSubscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteHook
      summary: Deregister a hook subscription
      tags: [Hooks]
      description: Idempotent — returns 204 even if the subscription doesn't exist.
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Filesystem (#178) ──────────────────────────────────────────────
  /v1/managed/filesystem/{tenant_id}/{session_id}/files:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
      - in: path
        name: session_id
        required: true
        schema: { type: string }
    get:
      operationId: listFiles
      summary: List files in a workspace
      tags: [Filesystem]
      parameters:
        - in: query
          name: mount
          schema: { type: string, default: /workspace }
        - in: query
          name: glob
          schema: { type: string }
          description: filepath.Match pattern applied to the basename.
        - in: query
          name: recursive
          schema: { type: string, enum: ["1", "true"] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: File list with metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMetaList' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/filesystem/{tenant_id}/{session_id}/files/{path}:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
      - in: path
        name: session_id
        required: true
        schema: { type: string }
      - in: path
        name: path
        required: true
        schema: { type: string }
        description: |
          File path within the workspace. URL-encoded; mount prefix is implicit.
    get:
      operationId: readFile
      summary: Read a file's raw bytes
      tags: [Filesystem]
      responses:
        '200':
          description: File content (Content-Type from the file's stored metadata).
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: writeFile
      summary: Write or overwrite a file
      tags: [Filesystem]
      parameters:
        - in: header
          name: If-Match
          schema: { type: string }
          description: SHA-256 of the current content for optimistic concurrency.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: File written.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '412':
          description: If-Match precondition failed.
        '507':
          description: Quota exceeded.
    delete:
      operationId: deleteFile
      summary: Delete a file
      tags: [Filesystem]
      description: Idempotent — returns 204 even if the file doesn't exist.
      responses:
        '204': { description: Deleted. }

  # ── Users (#179) ────────────────────────────────────────────────────
  /v1/managed/users:
    get:
      operationId: listUsers
      summary: List users
      tags: [Users]
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createUser
      summary: Create a user (default password; trigger reset on first sign-in)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/users/{user_id}:
    parameters:
      - in: path
        name: user_id
        required: true
        schema: { type: string }
    get:
      operationId: getUser
      summary: Get a user
      tags: [Users]
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [Users]
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Settings (#179) ────────────────────────────────────────────────
  /v1/managed/settings:
    get:
      operationId: listSettings
      summary: Read every platform setting
      tags: [Settings]
      responses:
        '200':
          description: Map of key → value. Value type varies per key.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/settings/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema: { type: string }
    get:
      operationId: getSetting
      summary: Read a single setting
      tags: [Settings]
      responses:
        '200':
          description: Setting value.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettingValue' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: putSetting
      summary: Write a single setting
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  description: New value (type varies per key).
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettingValue' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Sessions (#185) ────────────────────────────────────────────────
  /v1/managed/sessions:
    post:
      operationId: createManagedSession
      summary: Create a Nova OS native session
      tags: [Sessions]
      description: |
        Native partner-prefix session create. Shares the SessionStore
        with the Anthropic-compat /v1/sessions surface — state is
        consistent across the two mounts. No `anthropic-beta` header
        gate; partner-friendly response shape.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SessionCreate' }
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/sessions/{session_id}:
    parameters:
      - in: path
        name: session_id
        required: true
        schema: { type: string }
    get:
      operationId: getManagedSession
      summary: Get a session by ID
      tags: [Sessions]
      responses:
        '200':
          description: Session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Personas (nova-os-sdk#14, server PR #187) ─────────────────────
  /agents/v1/personas:
    get:
      operationId: listPersonas
      summary: Boot-time persona manifest with ETag round-trip
      tags: [Personas]
      description: |
        Returns the manifest envelope (`manifest_version` sha256 + every
        registered persona). Partners cache by `manifest_version` and
        send `If-None-Match` on subsequent fetches; the server replies
        304 with no body when the manifest hasn't changed.
      parameters:
        - in: header
          name: If-None-Match
          schema: { type: string }
          description: Cached `manifest_version` from a prior fetch.
      responses:
        '200':
          description: Full manifest.
          headers:
            ETag:
              schema: { type: string }
              description: The current `manifest_version`. Round-trip via `If-None-Match`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Manifest' }
        '304':
          description: Manifest unchanged. No body. Partner's cached version is current.

  /agents/v1/personas/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: getPersonaByID
      summary: Fetch a single persona by id
      description: |
        Returns the manifest entry for a single registered persona. 404 with
        a PersonaNotFoundError envelope when no persona matches the id.
      tags: [Personas]
      responses:
        '200':
          description: Persona entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonaManifestEntry' }
        '404':
          description: No persona with that id is registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonaNotFoundError' }

  # ── Deployment / capabilities (design D1) ─────────────────────────
  /v1/managed/deployment:
    get:
      operationId: getDeployment
      summary: Read this instance's capabilities, model tiers, locales, and auth contract
      tags: [Deployment]
      description: |
        Minimal capabilities read for boot-time client configuration. Lets a
        web or iOS client discover server version, optional feature labels,
        resolved model tiers, enabled locales, and the OIDC auth contract
        without probing individual endpoints. Per the contract-unification
        design (D1, lean: derive), this is deliberately small and advisory —
        `GET /agents/v1/personas` remains the source of truth for which agents
        exist.
      responses:
        '200':
          description: Deployment capabilities.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deployment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  # ==== chat ====
  /agents/v1/{api_key}/chat:
    parameters:
      - name: api_key
        in: path
        required: true
        description: The agent identifier the chat turn is routed to.
        schema: { type: string }
    post:
      operationId: nativeChat
      summary: Send a chat turn to an agent (native)
      tags: [Chat]
      description: >
        Native chat endpoint. Accepts either the simple `{message}` shape or the
        OpenAI-style `messages[]` array, plus Nova extensions (`fast`, `stream`,
        `brain`, `metadata`). The synchronous response carries the assistant
        `response`, an aggregated per-turn `usage` block (with a `by_stage[]`
        split), a `grounding` outcome, and the resolved `conversation_id`.
      parameters:
        - name: fast
          in: query
          required: false
          description: >
            Alias for the body `fast` flag. When true the request is dispatched
            directly to the agent's primary skill, skipping planning.
          schema: { type: boolean }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NativeChatRequest' }
      responses:
        '200':
          description: Chat turn completed (synchronous). SSE stream when `stream:true`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NativeChatResult' }
            text/event-stream:
              schema:
                type: string
                description: >
                  Server-Sent Events. Emitted when `stream:true`. Token/text
                  deltas plus, when `metadata.stream_events:true`, `tool_use` /
                  `tool_result` / `text` / `thinking` events, and `: nova-heartbeat`
                  keep-alive comments every 10s.
        '400':
          description: >
            Bad request — invalid body, no messages, or `fast:true` requested for
            an agent that has no skills.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /agents/v1/{api_key}/jobs:
    parameters:
      - name: api_key
        in: path
        required: true
        description: The agent identifier the job is submitted against.
        schema: { type: string }
    post:
      operationId: createNativeJob
      summary: Submit an asynchronous job
      tags: [Jobs]
      description: >
        Submit a long-running turn (e.g. deep research, multi-section report) as
        an asynchronous job. Returns 202 immediately; poll or stream for progress
        and the final result. Requires PostgreSQL persistence — returns 503 when
        async jobs are disabled.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NativeChatRequest' }
      responses:
        '202':
          description: Job accepted and queued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NativeJobAccepted' }
        '400':
          description: >
            Invalid body, no messages, or the target agent does not support
            asynchronous streaming.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Async jobs disabled (no persistence backend configured).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /agents/v1/{api_key}/jobs/{job_id}:
    parameters:
      - name: api_key
        in: path
        required: true
        schema: { type: string }
      - name: job_id
        in: path
        required: true
        description: The job identifier returned at submission.
        schema: { type: string }
    get:
      operationId: getNativeJob
      summary: Get job state
      tags: [Jobs]
      responses:
        '200':
          description: Current job state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NativeJob' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Async jobs disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: cancelNativeJob
      summary: Cancel a job
      tags: [Jobs]
      description: Request graceful cancellation of a non-terminal job.
      responses:
        '200':
          description: Cancellation accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NativeJobCancelled' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Job already in a terminal state (done/failed/cancelled).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: Async jobs disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /agents/v1/{api_key}/jobs/{job_id}/stream:
    parameters:
      - name: api_key
        in: path
        required: true
        schema: { type: string }
      - name: job_id
        in: path
        required: true
        schema: { type: string }
      - name: Last-Event-ID
        in: header
        required: false
        description: >
          Resume token. Replays persisted events with a sequence greater than this
          value, then continues live. Enables reconnect without losing events.
        schema: { type: integer, minimum: 0 }
    get:
      operationId: streamNativeJob
      summary: Stream job events (SSE)
      tags: [Jobs]
      description: >
        Server-Sent Events stream. Replays stored events first (honoring
        `Last-Event-ID`), then delivers live events until the job reaches a
        terminal state. Each frame carries `id` (sequence), `event` (type) and a
        JSON `data` payload; `: nova-heartbeat` comments are sent every 10s.
      responses:
        '200':
          description: Event stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE frames (`id:` / `event:` / `data:`).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Async jobs disabled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/chat/completions:
    post:
      operationId: chatCompletions
      summary: Chat completions (OpenAI-compatible)
      tags: [Chat]
      description: >
        OpenAI-compatible chat completions. Accepts the standard `model`,
        `messages`, `stream`, and `max_tokens` / `max_completion_tokens` fields.
        The response reports the provider's real `finish_reason` and a per-response
        `usage`. Report-style requests are auto-detected and streamed with periodic
        heartbeat comments. When gateway mode is enabled, a `model` of the form
        `llm:<provider>/<model>` bypasses the agent pipeline and forwards the call
        straight to the underlying provider (raw passthrough).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatCompletionRequest' }
      responses:
        '200':
          description: >
            Completion (synchronous) or an SSE stream of `chat.completion.chunk`
            frames terminated by `[DONE]` when `stream:true`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatCompletionResponse' }
            text/event-stream:
              schema:
                type: string
                description: >
                  `data:`-framed `chat.completion.chunk` objects, a terminal
                  `finish_reason` chunk, then `data: [DONE]`. Includes
                  `: nova-heartbeat` keep-alive comments.
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '502':
          description: Upstream provider error (raw passthrough path).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '503':
          description: No provider configured for passthrough.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /v1/models:
    get:
      operationId: listModels
      summary: List available models (OpenAI-compatible)
      tags: [Chat]
      description: >
        Lists the models available to the caller in OpenAI's `{object:"list",
        data:[...]}` shape. Each entry is an agent id; disabled agents are hidden.
        When gateway mode is enabled and a passthrough allowlist is configured,
        raw provider models are additionally advertised with `llm:` ids.
      responses:
        '200':
          description: Model list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ModelList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/messages/count_tokens:
    post:
      operationId: countTokens
      summary: Count input tokens (Anthropic-compatible)
      tags: [Chat]
      description: >
        Anthropic-compatible pre-flight token count. Accepts the Messages request
        shape and returns an estimated `input_tokens` for the supplied
        system + messages. Citation/document consistency validators run here too,
        so misconfigurations surface as 400 before the chat path.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CountTokensRequest' }
      responses:
        '200':
          description: Estimated input token count.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CountTokensResult' }
        '400':
          description: Invalid request or validation failure.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  # ==== media ====
  /v1/audio/transcriptions:
    post:
      operationId: transcribeAudio
      summary: Transcribe audio to text (speech-to-text)
      description: >-
        OpenAI-compatible speech-to-text. Upload an audio file as multipart
        form data and receive a transcript. When `language` is omitted the
        model auto-detects, including mixed-language audio. Requires a normal
        authenticated caller (same auth as chat); not admin-only.
      tags: [Audio]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TranscriptionRequest'
      responses:
        '200':
          description: >-
            Transcript. With `response_format=json` (default) a JSON object is
            returned; verbose/segment formats and `text`/`srt`/`vtt` are
            proxied from the model verbatim.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
            text/plain:
              schema:
                type: string
                description: Raw transcript when a non-JSON response_format is requested.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: >-
            Audio file exceeds the configured upload ceiling (default 25 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Transcription is unconfigured or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/audio/speech:
    post:
      operationId: synthesizeSpeech
      summary: Synthesize speech from text (text-to-speech)
      description: >-
        OpenAI-compatible text-to-speech. Send text and receive audio bytes in
        the response body. The `voice` must belong to the same provider as the
        selected `model` (e.g. Gemini voices for the default Gemini TTS model);
        a mismatched voice is rejected upstream. Not admin-only.
      tags: [Audio]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeechRequest'
      responses:
        '200':
          description: >-
            Synthesized audio. Content-Type reflects the requested
            `response_format` (default `audio/mpeg`).
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request body exceeds the configured ceiling (default 1 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Speech synthesis is unconfigured or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/realtime:
    get:
      operationId: realtimeVoice
      summary: Full-duplex speech-to-speech voice session (WebSocket)
      description: >-
        Opens a full-duplex voice WebSocket. The client performs a WebSocket
        upgrade (responds `101 Switching Protocols`) on this authenticated
        endpoint; audio and event frames are then pumped bidirectionally between
        the client and the realtime speech-to-speech model. Standard REST error
        responses are returned only if the upgrade or upstream connection fails
        before the session starts.
      tags: [Audio]
      parameters:
        - name: model
          in: query
          required: false
          description: >-
            Realtime model to use (provider-prefixed). Falls back to the
            server-configured default when omitted.
          schema:
            type: string
            example: gemini/gemini-3.1-flash-live-preview
        - name: Connection
          in: header
          required: true
          description: Must be `Upgrade` for the WebSocket handshake.
          schema:
            type: string
            example: Upgrade
        - name: Upgrade
          in: header
          required: true
          description: Must be `websocket` for the WebSocket handshake.
          schema:
            type: string
            example: websocket
      responses:
        '101':
          description: >-
            WebSocket handshake accepted; the connection is upgraded and voice
            frames flow in both directions until either side closes.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          description: The upstream realtime endpoint could not be reached.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Realtime voice is unconfigured or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/images/generations:
    post:
      operationId: generateImage
      summary: Generate images from a text prompt
      description: >-
        OpenAI-compatible image generation. The request body is forwarded to the
        configured image model and the response is returned unchanged, so the
        client owns all parameters. `model` must be provider-prefixed
        (e.g. `Alibaba/z-image-turbo`). Not admin-only.
      tags: [Images]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImageGenerationRequest'
      responses:
        '200':
          description: Generated images (URLs or base64) per `response_format`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request body exceeds the configured ceiling (default 25 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Image generation is unconfigured or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/images/edits:
    post:
      operationId: editImage
      summary: Edit an image from a prompt and source image(s)
      description: >-
        OpenAI-compatible image edit. Multipart body carrying the source image
        (and optional mask) plus edit parameters is forwarded to the configured
        image model and the response is returned unchanged. `model` must be
        provider-prefixed. Not admin-only.
      tags: [Images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageEditRequest'
      responses:
        '200':
          description: Edited images (URLs or base64) per `response_format`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request body exceeds the configured ceiling (default 25 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Image generation is unconfigured or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /v1/images/variations:
    post:
      operationId: imageVariation
      summary: Create variations of a source image
      description: >-
        OpenAI-compatible image variation. Multipart body carrying the source
        image plus variation parameters is forwarded to the configured image
        model and the response is returned unchanged. `model` must be
        provider-prefixed. Not admin-only.
      tags: [Images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ImageVariationRequest'
      responses:
        '200':
          description: Image variations (URLs or base64) per `response_format`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request body exceeds the configured ceiling (default 25 MB).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'
        '503':
          description: Image generation is unconfigured or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  # ==== docs ====
  /v1/managed/documents/ocr:
    post:
      operationId: ocrDocument
      summary: OCR a scanned or image-only PDF into markdown
      tags: [Documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The PDF to OCR.
                file_sha256:
                  type: string
                  description: Optional caller-supplied SHA-256 of the file, used as the result-cache key.
                max_pages:
                  type: integer
                  description: Optional cap on pages to process (0 or omitted = all pages).
          application/json:
            schema: { $ref: '#/components/schemas/OcrRequest' }
      responses:
        '200':
          description: OCR result. Repeat calls on the same file are served from cache.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OcrResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '413':
          description: Decoded PDF exceeds the size limit.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: Body is not a PDF.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: OCR is disabled on this deployment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/documents/extract:
    post:
      operationId: extractDocument
      summary: Extract text from an office document
      tags: [Documents]
      description: >-
        Native text extraction for office and structured documents
        (DOCX, XLSX, ODT, text-layer PDF, CSV, JSON, XML, YAML, HTML, Markdown, EML).
        A filename with a recognised extension is required to route the parser.
        Scanned or image-only PDFs have no text layer — use /v1/managed/documents/ocr instead.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The document to extract. The part's filename supplies the extension.
                filename:
                  type: string
                  description: Optional filename override (wins over the uploaded part's name).
          application/json:
            schema: { $ref: '#/components/schemas/ExtractRequest' }
      responses:
        '200':
          description: Extracted text and detected document metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExtractResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413':
          description: Decoded document exceeds the size limit.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: File extension is not a supported document type.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Extraction is disabled on this deployment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/memory:
    get:
      operationId: getMemory
      summary: Read your observational memory for one persona
      tags: [Memory]
      description: >-
        Returns the calling identity's own accumulated memory log for a single persona.
        Responds 200 with empty content when nothing has been remembered yet.
      parameters:
        - in: query
          name: agent_id
          required: true
          description: The persona whose memory to read.
          schema: { type: string }
        - in: query
          name: scope
          required: false
          description: Which memory scope to read. Defaults to corporate.
          schema:
            type: string
            enum: [corporate, personal]
            default: corporate
      responses:
        '200':
          description: Memory log (empty content when nothing remembered yet).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryLog' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /v1/managed/knowledge-signals:
    get:
      operationId: listKnowledgeSignals
      summary: List queued knowledge signals by status
      tags: [Knowledge]
      description: Admin-only curator view of captured knowledge signals awaiting review.
      parameters:
        - in: query
          name: status
          required: false
          description: Filter by signal status. Defaults to pending.
          schema:
            type: string
            enum: [pending, quarantined, eligible, promoted, rejected, superseded]
            default: pending
        - in: query
          name: limit
          required: false
          description: Maximum signals to return. Defaults to 100.
          schema: { type: integer, default: 100 }
        - in: query
          name: tenant
          required: false
          description: Admin override to read another tenant's signals. Defaults to the caller's tenant.
          schema: { type: string }
      responses:
        '200':
          description: The matching signals and their count.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeSignalList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Knowledge signals are unavailable on this deployment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/knowledge-signals/candidates:
    get:
      operationId: listPromotionCandidates
      summary: List knowledge signals eligible for promotion
      tags: [Knowledge]
      description: >-
        Admin-only. Returns the fact keys that have cleared the promotion quorum and are
        candidates for promotion into the knowledge store. Promotion itself is a separate step.
      parameters:
        - in: query
          name: tenant
          required: false
          description: Admin override to read another tenant's candidates. Defaults to the caller's tenant.
          schema: { type: string }
      responses:
        '200':
          description: The promotion-eligible fact keys.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PromotionCandidates' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Knowledge signals are unavailable on this deployment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  # ==== files ====
  /v1/files:
    post:
      operationId: uploadFile
      summary: Upload a file
      description: >-
        Upload a file via multipart form. The file text is extracted and
        indexed into the caller's knowledge collection so subsequent chat
        turns can retrieve it. OpenAI Files API compatible.
      tags: [Files]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload.
                purpose:
                  type: string
                  description: Intended use of the file. Defaults to `assistants`.
      responses:
        '200':
          description: The uploaded file object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileObject' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Document engine unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/files/{id}:
    get:
      operationId: getFile
      summary: Retrieve a file
      tags: [Files]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The file object.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileObject' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Document engine unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: deleteUploadedFile
      summary: Delete a file
      tags: [Files]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deletion confirmation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileDeleted' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503':
          description: Document engine unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/conversations:
    get:
      operationId: listConversations
      summary: List conversations
      description: List the caller's conversations, newest first.
      tags: [Conversations]
      parameters:
        - name: agent
          in: query
          required: false
          description: Filter to conversations for a single agent.
          schema: { type: string }
        - name: limit
          in: query
          required: false
          description: Maximum conversations to return (1-200, default 50).
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: The caller's conversations.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createConversation
      summary: Create a conversation
      description: >-
        Explicitly create (or idempotently claim) a conversation before the
        first chat turn. Re-posting the same `id` returns the existing row
        without overwriting its owner or metadata.
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConversationCreate' }
      responses:
        '201':
          description: The created (or existing) conversation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '413':
          description: Metadata exceeds the 4 KB cap.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/conversations/{id}:
    get:
      operationId: getConversation
      summary: Retrieve a conversation
      description: >-
        Single-conversation detail including the message log. Returns 404 for
        both "does not exist" and "exists but not owned by the caller".
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Conversation metadata and message log.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: renameConversation
      summary: Rename a conversation
      description: >-
        Set the conversation title. The title is trimmed; empty after trim
        clears it. Limited to 200 characters.
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, maxLength: 200 }
      responses:
        '200':
          description: The updated conversation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Conversation' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteConversation
      summary: Delete a conversation
      description: Hard-delete a conversation and its message log.
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Deletion confirmation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationDeleted' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /v1/conversations/{id}/metadata:
    patch:
      operationId: updateConversationMetadata
      summary: Replace conversation metadata
      description: >-
        Replace (not merge) the app-owned metadata map on the conversation.
        Keys with the reserved `nova_` prefix are rejected; the serialized
        map is capped at 4 KB.
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: The updated metadata map.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  metadata:
                    type: object
                    additionalProperties: true
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '413':
          description: Metadata exceeds the 4 KB cap.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/conversations/{cid}/attachments:
    post:
      operationId: addAttachment
      summary: Attach a file to a conversation
      description: >-
        Upload a file scoped to a single conversation via multipart form.
        The caller must own the conversation; on first upload an unclaimed
        conversation id is claimed by the caller.
      tags: [Conversations]
      parameters:
        - name: cid
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to attach.
      responses:
        '201':
          description: The stored attachment reference.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Attachment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Per-conversation attachment cap reached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '413':
          description: File exceeds the maximum allowed size.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '415':
          description: MIME type not in the allowlist.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
  /v1/conversations/{cid}/attachments/{aid}/download:
    get:
      operationId: downloadAttachment
      summary: Download an attachment
      description: >-
        Stream the attachment bytes. Depending on operator configuration the
        response is either the bytes directly or a 302 redirect to a
        time-limited download URL.
      tags: [Conversations]
      parameters:
        - name: cid
          in: path
          required: true
          schema: { type: string }
        - name: aid
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The attachment bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '302':
          description: Redirect to a time-limited download URL.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410':
          description: The attachment was deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      operationId: deleteAttachment
      summary: Remove an attachment
      description: Soft-delete an attachment. Idempotent.
      tags: [Conversations]
      parameters:
        - name: cid
          in: path
          required: true
          schema: { type: string }
        - name: aid
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: The attachment was deleted (or was already deleted).
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  # ==== governance ====
  /v1/managed/actions:
    get:
      operationId: listActions
      summary: List pending actions in the approval queue
      description: >-
        Admins see every action; a group member sees only actions carrying a
        group_id for a group they belong to. Requires the pending-actions
        feature to be enabled.
      tags: [Actions]
      parameters:
        - name: status
          in: query
          description: Filter by status; unrecognized values fall back to `pending`.
          schema:
            type: string
            enum: [pending, approved, rejected, executed, failed]
        - name: source
          in: query
          description: Filter by connector source label.
          schema: { type: string }
        - name: external_ref
          in: query
          description: Filter by connector correlation key.
          schema: { type: string }
        - name: limit
          in: query
          description: Max rows (default 50, capped at 200).
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        '200':
          description: The matching actions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled or PostgreSQL unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    post:
      operationId: createAction
      summary: Park a connector-sourced action for approval
      description: >-
        Lets an external connector submit a side-effecting action for human
        approval. Requires an admin-role credential. The callback webhook is
        snapshotted onto the row and fired only when the action is approved;
        `callback.auth.secret_ref` names an environment variable on the server
        holding the shared HMAC secret — the secret itself is never transmitted.
      tags: [Actions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateActionRequest' }
      responses:
        '201':
          description: The parked action.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled or PostgreSQL unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/actions/{id}:
    get:
      operationId: getAction
      summary: Fetch one pending action
      description: >-
        Admins may fetch any action; group members may fetch actions for their
        groups. An unknown id and a no-access id both return 404 (existence is
        not leaked).
      tags: [Actions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The action.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled or PostgreSQL unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/actions/{id}/claim:
    post:
      operationId: claimAction
      summary: Soft-claim a pending action
      description: >-
        First-wins soft claim so two approvers do not double-handle the same
        action. Admin or an approver/lead member of the action's group.
      tags: [Actions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The claimed action.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already claimed by another user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: already_claimed }
                  claimed_by: { type: string }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled or PostgreSQL unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/actions/{id}/approve:
    post:
      operationId: approveAction
      summary: Approve and execute a pending action
      description: >-
        Atomically transitions the action pending→approved, then fires its
        webhook once. Admin or an approver/lead member of the action's group.
        The terminal outcome is carried in the returned action's `status` /
        `result` fields (HTTP 200 is returned whether execution succeeded or
        failed).
      tags: [Actions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionDecisionRequest' }
      responses:
        '200':
          description: The action after execution (check `status`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Action was already decided by another caller.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: already_decided }
                  status: { type: string }
        '502':
          description: The executor could not be resolved; the action is marked failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled, executor not configured, or PostgreSQL unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/actions/{id}/reject:
    post:
      operationId: rejectAction
      summary: Reject a pending action without executing it
      description: >-
        Atomically transitions the action pending→rejected. The webhook is not
        fired. Admin or an approver/lead member of the action's group.
      tags: [Actions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionDecisionRequest' }
      responses:
        '200':
          description: The rejected action.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActionEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Action was already decided by another caller.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string, example: already_decided }
                  status: { type: string }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled or PostgreSQL unavailable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
  /v1/managed/groups:
    get:
      operationId: listGroups
      summary: List groups
      description: Admin-only. Optionally scoped to one tenant.
      tags: [Groups]
      parameters:
        - name: tenant_id
          in: query
