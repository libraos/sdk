    put:
      operationId: updateFieldPolicy
      summary: Create or replace the field policy for a record type
      description: Admin-only. Upserts the policy for `(tenant, type)`.
      tags: [FieldPolicies]
      parameters:
        - name: type
          in: path
          required: true
