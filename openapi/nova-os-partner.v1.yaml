        request tenant.
      tags: [FieldPolicies]
      parameters:
        - name: record_type
          in: query
          description: Filter by record type.
          schema: { type: string }
        - name: record_id
          in: query
          description: Filter by record id.
          schema: { type: string }
        - name: since
          in: query
          description: Only events at or after this RFC 3339 timestamp.
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          description: Max rows (default 200, capped at 1000).
          schema: { type: integer, default: 200, maximum: 1000 }
      responses:
        '200':
          description: The matching audit events.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FieldAccessEventList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '503':
          description: Feature disabled.
