openapi: 3.1.0
info:
  title: Nova OS Partner API
  version: 1.0.0-alpha.5
  description: |
    Partner integration API for Nova OS. Mirrors Anthropic Managed Agents
    1:1 for the compat surface (Section 1.1 of the design); extends with
    employees, multi-model config, web-search backend selection, custom-tool
    webhook callbacks, and async jobs (Section 1.2).
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Nova OS Team
    url: https://github.com/MeganovaAI/nova-os-sdk
    email: support@meganova.ai

servers:
  - url: https://nova.partner.example.com
    description: Partner-self-hosted Nova OS (v1 default)
  - url: https://api.nova-os.com
    description: Nova OS managed cloud (future)
  - url: http://localhost:8900
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Deployment
    description: Boot-time capabilities / model-tier / locale / auth read.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed JWT bearer token. Partners mint tokens server-side per
        their tenancy model. The cloud variant accepts `msk_live_…` tokens
        in the same Bearer slot.

  schemas:
    Error:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum:
            - invalid_request_error
            - authentication_error
            - permission_error
            - not_found_error
            - rate_limit_error
            - billing_error
            - upstream_error
            - vertex_schema_error
            - validation_error
            - internal_error
        message:
          type: string
        param:
          type: string
          description: When applicable, the request parameter that failed validation.
        code:
          type: string
          description: Machine-readable subcode (e.g., "credits_exhausted", "USAGE_LIMIT_EXCEEDED").
        retry_after:
          type: integer
          description: Seconds — present on rate_limit_error.
        tool_name:
          type: string
          description: Present on vertex_schema_error — the tool whose schema is invalid.
        parameter_path:
          type: string
          description: Present on vertex_schema_error — JSON path to the offending parameter.
        fix_hint:
          type: string
          description: Human-readable hint for actionable errors.

    AgentType:
      type: string
      enum: [persona, skill]
      description: |
        Whether this agent dispatches to other skill agents (persona) or
        executes one skill directly (skill). Maps to nova-os internals;
        partners only see the discriminator.

    ModelSlot:
      type: object
      required: [primary]
      properties:
        primary:
          type: string
          description: Model identifier in `<vendor>/<model>` shape (e.g., `gemini/gemini-3.1-pro-preview`).
          pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$'
        fallback:
          type: array
          items:
            type: string
            pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$'
          description: |
            Ordered fallback chain. Activates on rate-limit / 5xx / vendor outage /
            Vertex 400 schema-error before falling through to the next resolution level.

    ModelConfig:
      type: object
      description: |
        Three-slot model configuration. Any slot may be omitted; resolution
        falls through per the spec (per-call → per-skill → per-agent →
        per-employee → server default).
      properties:
        answer:
          $ref: '#/components/schemas/ModelSlot'
          description: Main chat / synthesis model.
        planner:
          $ref: '#/components/schemas/ModelSlot'
          description: Brain / DAG planning model.
        skill:
          $ref: '#/components/schemas/ModelSlot'
          description: Cheap tier for skill agents + report sections.

    WebSearchBackend:
      type: string
      enum: [tavily, brave, exa, searxng, meganova, auto]
      description: |
        Web search backend selection. `auto` uses the server's default
        priority order (operator-configured).

    WebSearchConfig:
      type: object
      description: |
        Persona-level web-search configuration. Resolved per-invocation on
        ``skill_deep_research`` via ``searchctx.WebSearchConfigFromContext``.
        Field names changed in nova-os PR #212 (closes #200) — old
        ``backend`` / ``fallback`` are no longer accepted.
      properties:
        primary_backend:
          $ref: '#/components/schemas/WebSearchBackend'
          default: auto
          description: |
            Primary search backend. ``auto`` falls through to the server's
            ``DefaultSearcher()`` priority order.
        fallback_chain:
          type: array
          items:
            $ref: '#/components/schemas/WebSearchBackend'
          description: |
            Ordered fallback chain. Used on empty/error/off-topic results.
            Wraps the primary in a ``FallbackSearcher`` whose ``Name()``
            renders as ``primary→fallback1→fallback2``.
        reformulator:
          type: boolean
          default: true
          description: |
            Wrap the search call with the LLM reformulator. Improves
            retrieval quality on broad queries. Applied only to keyword
            backends; bundled-extraction backends handle reformulation
            internally.
        recency_terms:
          type: array
          items:
            type: string
          description: Custom recency markers for the recency-intent escalator.

    JSONSchemaObject:
      type: object
      description: |
        A subset of JSON Schema Draft 2020-12 used for tool input schemas.
        Vertex AI rejects `type:array` without `items` — the SDK validator
        enforces `items` is present everywhere on write.
      additionalProperties: true

    CustomToolCallback:
      type: object
      required: [url, auth]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS URL (or http://localhost:* for dev). Webhook target.
        auth:
          type: object
          required: [type, secret_ref]
          properties:
            type:
              type: string
              enum: [hmac_sha256]
            secret_ref:
              type: string
              description: Settings-store key holding the HMAC shared secret.
        timeout_sec:
          type: integer
          minimum: 1
          maximum: 600
          default: 30
        retry:
          type: object
          properties:
            max_attempts:
              type: integer
              minimum: 1
              maximum: 10
              default: 3
            backoff:
              type: string
              enum: [exponential, linear, fixed]
              default: exponential

    CustomTool:
      type: object
      required: [name, input_schema]
      properties:
        name:
          type: string
          pattern: '^[a-z][a-z0-9_]*$'
          description: Lowercase snake_case identifier; unique within the agent.
        description:
          type: string
          description: Free-text description shown to the LLM via the tool definition.
        input_schema:
          $ref: '#/components/schemas/JSONSchemaObject'
        callback:
          $ref: '#/components/schemas/CustomToolCallback'
          description: |
            Per-tool callback override. Falls through to agent.callback then
            employee.callback. Required at one of the three levels.

    Skill:
      type: object
      required: [name]
      properties:
        name:
          type: string
        model:
          type: string
          pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$'
          description: Per-skill model override (highest priority below per-call).

    Agent:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          pattern: '^[a-z0-9-]+$'
          description: Slug generated from the agent name.
        version:
          type: integer
          readOnly: true
        name:
          type: string
        model:
          type: string
          description: Optional model override; empty means inherit the server tier default.
        system:
          type: string
        tools:
          type: array
          items:
            type: string
        owner:
          type: string
          description: Owner email; defaults to the caller when omitted.
        visibility:
          type: string
          enum: ["", private, public]
        agent_type:
          $ref: '#/components/schemas/AgentType'
        brain:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        max_turns:
          type: integer
          minimum: 0
          maximum: 100
        output_type:
          $ref: '#/components/schemas/OutputTypeContract'
        knowledge_bindings:
          type: array
          items:
            type: string
        guardrails:
          type: object
          additionalProperties: true
        filesystem:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          readOnly: true

        # Legacy SDK aliases kept optional for transition. The live Nova OS
        # server accepts the canonical fields above.
        type:
          $ref: '#/components/schemas/AgentType'
          deprecated: true
        owner_employee:
          type: string
          deprecated: true
        system_prompt:
          type: string
          deprecated: true

    AgentCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        model:
          type: string
        system:
          type: string
        tools:
          type: array
          items:
            type: string
        owner:
          type: string
        visibility:
          type: string
          enum: ["", private, public]
        filesystem:
          type: object
          additionalProperties: true
        agent_type:
          $ref: '#/components/schemas/AgentType'
        brain:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        max_turns:
          type: integer
          minimum: 0
          maximum: 100
        output_type:
          $ref: '#/components/schemas/OutputTypeContract'
        knowledge_bindings:
          type: array
          items:
            type: string
        guardrails:
          type: object
          additionalProperties: true

    AgentUpdate:
      type: object
      description: Partial update; only the fields supplied are changed.
      properties:
        name:
          type: string
        model:
          type: string
        system:
          type: string
        tools:
          type: array
          items:
            type: string
        owner:
          type: string
        visibility:
          type: string
          enum: ["", private, public]
        filesystem:
          type: object
          additionalProperties: true
        agent_type:
          $ref: '#/components/schemas/AgentType'
        brain:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        max_turns:
          type: integer
        output_type:
          $ref: '#/components/schemas/OutputTypeContract'
        knowledge_bindings:
          type: array
          items:
            type: string
        guardrails:
          type: object
          additionalProperties: true

    AgentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        has_more:
          type: boolean
        next_cursor:
          type: string

    Employee:
      type: object
      required: [id]
      properties:
        id:
          type: string
          pattern: '^[a-z0-9-]+$'
        display_name:
          type: string
        description:
          type: string
        model_config:
          $ref: '#/components/schemas/ModelConfig'
          description: Cascades to all owned agents unless they override.
        web_search_config:
          $ref: '#/components/schemas/WebSearchConfig'
          description: Cascades to owned agents.
        callback:
          $ref: '#/components/schemas/CustomToolCallback'
          description: Catch-all callback for any owned-agent tool with no closer match.
        agents:
          type: array
          items:
            type: string
          description: IDs of agents owned by this employee.
          readOnly: true
        storage_path:
          type: string
          description: Filesystem path under users/<owner>/employees/<id>/.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    EmployeeCreate:
      allOf:
        - $ref: '#/components/schemas/Employee'
      required: [id]

    EmployeeUpdate:
      type: object
      properties:
        display_name:
          type: string
        description:
          type: string
        model_config:
          $ref: '#/components/schemas/ModelConfig'
        web_search_config:
          $ref: '#/components/schemas/WebSearchConfig'
        callback:
          $ref: '#/components/schemas/CustomToolCallback'

    EmployeeList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Employee'
        has_more:
          type: boolean
        next_cursor:
          type: string

    BundleManifest:
      type: object
      required: [schema_version, employee_id, nova_os_min_version, created_at]
      properties:
        schema_version:
          type: integer
          enum: [1]
        employee_id:
          type: string
        nova_os_min_version:
          type: string
        created_at:
          type: string
          format: date-time
        agents:
          type: array
          items:
            type: string
        knowledge_files:
          type: integer

    BundleImportResult:
      type: object
      required: [employee_id, agents_imported]
      properties:
        employee_id:
          type: string
        agents_imported:
          type: integer
        knowledge_files_indexed:
          type: integer
        warnings:
          type: array
          items:
            type: string

    Role:
      type: string
      enum: [user, assistant, system]

    TextBlock:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [text]
        text:
          type: string

    ToolUseBlock:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    ToolResultBlock:
      type: object
      required: [type, tool_use_id, content]
      properties:
        type:
          type: string
          enum: [tool_result]
        tool_use_id:
          type: string
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/TextBlock'
        is_error:
          type: boolean
          default: false

    ContentBlock:
      oneOf:
        - $ref: '#/components/schemas/TextBlock'
        - $ref: '#/components/schemas/ToolUseBlock'
        - $ref: '#/components/schemas/ToolResultBlock'
      discriminator:
        propertyName: type

    Message:
      type: object
      required: [role, content]
      properties:
        role:
          $ref: '#/components/schemas/Role'
        content:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/components/schemas/ContentBlock'

    ToolDefinition:
      type: object
      required: [name, input_schema]
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          $ref: '#/components/schemas/JSONSchemaObject'
        type:
          type: string
          enum:
            - custom
            - web_search_20250305
            - text_editor_20250124
            - bash_20250124
          default: custom

    MessageRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        model:
          type: string
          description: Per-call override; matches Anthropic shape, also accepts <vendor>/<model>.
          pattern: '^[a-z0-9_.-]+/[A-Za-z0-9_.:-]+$|^claude-[a-z0-9._-]+$'
        max_tokens:
          type: integer
          minimum: 1
          maximum: 64000
          default: 4096
        temperature:
          type: number
          minimum: 0
          maximum: 2
        system:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        stream:
          type: boolean
          default: false
        metadata:
          type: object
          properties:
            agent_id:
              type: string
              description: |
                Target a specific Nova OS agent/persona for this turn; omit
                for the default agent. Typed here so generated clients can set
                it without falling back to untyped additionalProperties.
            brain:
              type: boolean
              description: Per-call planner toggle (3-state — null inherits server default).
            stream_events:
              type: boolean
              description: Per-call orchestration event streaming toggle.
            stream_thinking:
              type: boolean
              description: Per-call planner-thinking event toggle.
          additionalProperties: true

    MessageResponse:
      type: object
      required: [id, role, content, model, stop_reason]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message]
        role:
          $ref: '#/components/schemas/Role'
        content:
          type: array
          items:
            $ref: '#/components/schemas/ContentBlock'
        model:
          type: string
          description: Resolved model that handled the request.
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, stop_sequence, tool_use]
        usage:
          type: object
          properties:
            input_tokens:
              type: integer
            output_tokens:
              type: integer
        model_used:
          type: string
          description: Nova OS extension — same as `model`, surfaced for clarity.
        fallback_triggered:
          type: boolean
          description: Nova OS extension — true if a fallback model handled the request.
        output_violations:
          type: array
          description: |
            Nova OS extension — populated only when the agent declared an
            `output_type` contract AND the reply failed validation AND the
            agent's `violation_mode` is `log` or `repair` (with `error`,
            the response is a 422 instead). Empty array means no violations.
          items:
            $ref: '#/components/schemas/OutputViolation'
        route_hint:
          $ref: '#/components/schemas/RouteHint'
          description: |
            Nova OS extension (v0.1.5+) — Brain's dispatch hint to the
            partner UI. Always present on terminal replies; partners that
            don't consume route hints can ignore the field. Three kinds:
            `render_inline`, `navigate_to`, `ask_clarification`.

    StreamEventTextDelta:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [text]
        content:
          type: string

    StreamEventToolUse:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    StreamEventToolResult:
      type: object
      required: [type, tool_use_id]
      properties:
        type:
          type: string
          enum: [tool_result]
        tool_use_id:
          type: string
        output_summary:
          type: string
          description: Preview-truncated (~1KB on the wire); full payload in call_log.
        is_error:
          type: boolean

    StreamEventCustomToolUse:
      type: object
      required: [type, id, name, input]
      properties:
        type:
          type: string
          enum: [custom_tool_use]
        id:
          type: string
        name:
          type: string
        input:
          type: object
          additionalProperties: true

    StreamEventThinking:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [thinking]
        content:
          type: string

    StreamEventError:
      type: object
      required: [type, error]
      properties:
        type:
          type: string
          enum: [error]
        error:
          $ref: '#/components/schemas/Error'

    StreamEventDone:
      type: object
      required: [type, status]
      properties:
        type:
          type: string
          enum: [done]
        status:
          type: string
          enum: [completed, failed, cancelled]
        message_id:
          type: string

    StreamEventRouteHint:
      type: object
      required: [type, route_hint]
      description: |
        Nova OS extension (v0.1.5+) — emitted exactly once per terminal
        message right before `done`. Carries Brain's dispatch decision so
        partner UIs can react before the full reply is rendered.
      properties:
        type:
          type: string
          enum: [route_hint]
        route_hint:
          $ref: '#/components/schemas/RouteHint'

    StreamEvent:
      oneOf:
        - $ref: '#/components/schemas/StreamEventTextDelta'
        - $ref: '#/components/schemas/StreamEventToolUse'
        - $ref: '#/components/schemas/StreamEventToolResult'
        - $ref: '#/components/schemas/StreamEventCustomToolUse'
        - $ref: '#/components/schemas/StreamEventThinking'
        - $ref: '#/components/schemas/StreamEventError'
        - $ref: '#/components/schemas/StreamEventDone'
        - $ref: '#/components/schemas/StreamEventRouteHint'
      discriminator:
        propertyName: type

    OutputTypeContract:
      type: object
      required: [schema]
      description: |
        Structured-output contract for agent replies. When set, Nova OS
        validates every assistant reply against `schema` before return.
        Server-side since v0.1.4.
      properties:
        schema:
          $ref: '#/components/schemas/JSONSchemaObject'
          description: JSON Schema 2020-12 the assistant reply must validate against.
        violation_mode:
          type: string
          enum: [error, log, repair]
          default: error
          description: |
            How to handle a reply that fails validation:
            - `error` — return HTTP 422 with the violations.
            - `log` — return the reply as-is plus `output_violations`; partner decides what to do.
            - `repair` — re-prompt the model once with the schema in the system prompt;
              return whichever attempt validates, plus `output_violations` from the first.

    OutputViolation:
      type: object
      required: [path, message]
      properties:
        path:
          type: string
          description: JSON Pointer into the assistant reply where the violation occurred.
        message:
          type: string
          description: Human-readable description of the failure (from the JSON Schema validator).
        keyword:
          type: string
          description: The JSON Schema keyword that failed (e.g. `type`, `required`, `enum`).

    RouteHintRenderInline:
      type: object
      required: [kind]
      description: |
        Brain decided the reply is the answer — render it inline in the
        partner's chat UI. No navigation needed.
      properties:
        kind:
          type: string
          enum: [render_inline]

    RouteHintNavigateTo:
      type: object
      required: [kind, template]
      description: |
        Brain decided the partner UI should navigate to a route. The
        template name MUST match a key in the agent's `route_templates`;
        the server interpolates `params` into the URL template.
      properties:
        kind:
          type: string
          enum: [navigate_to]
        template:
          type: string
          description: Key into the agent's `route_templates` map.
        params:
          type: object
          additionalProperties: true
          description: Values to interpolate into the template's `{placeholder}` segments.

    RouteHintAskClarification:
      type: object
      required: [kind, reason]
      description: |
        Brain decided more input is needed before answering — partner UI
        should present a clarification prompt rather than rendering the
        reply as final.
      properties:
        kind:
          type: string
          enum: [ask_clarification]
        reason:
          type: string
          description: Short human-readable rationale (e.g. `missing_jurisdiction`).

    RouteHint:
      description: |
        Brain's dispatch hint, present on every terminal reply (v0.1.5+).
        Three kinds — partners switch on `kind` to decide UI behaviour.
      oneOf:
        - $ref: '#/components/schemas/RouteHintRenderInline'
        - $ref: '#/components/schemas/RouteHintNavigateTo'
        - $ref: '#/components/schemas/RouteHintAskClarification'
      discriminator:
        propertyName: kind

    CustomToolResultRequest:
      type: object
      required: [tool_use_id, output]
      properties:
        tool_use_id:
          type: string
        output:
          type: string
        is_error:
          type: boolean
          default: false

    JobStatus:
      type: string
      enum: [queued, running, completed, failed, cancelled]

    Job:
      type: object
      required: [job_id, agent_id, status, created_at]
      properties:
        job_id:
          type: string
        agent_id:
          type: string
        employee_id:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/MessageResponse'
        error:
          $ref: '#/components/schemas/Error'
        event_count:
          type: integer
          readOnly: true
        instance_id:
          type: string
          readOnly: true

    JobCreate:
      type: object
      required: [agent_id, messages]
      properties:
        agent_id:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        model:
          type: string
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDefinition'
        metadata:
          type: object
          additionalProperties: true

    JobList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        has_more:
          type: boolean
        next_cursor:
          type: string

    # ── Documents (#175) ──────────────────────────────────────────────
    Document:
      type: object
      required: [id, title]
      properties:
        id: { type: string, readOnly: true }
        title: { type: string, description: File name or extracted title }
        path: { type: string, description: Collection path (e.g. "contracts/2026") }
        type: { type: string, description: "Document type — pdf, docx, md, etc." }
        size_bytes: { type: integer, format: int64, readOnly: true }
        collection_id: { type: string, description: Parent collection (empty = root) }
        metadata:
          type: object
          additionalProperties: { type: string }
          description: Mime, pages, author, etc.
        created_at: { type: string, format: date-time, readOnly: true }

    DocumentList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Document' }
        has_more: { type: boolean }
        next_cursor: { type: string }

    # ── Knowledge (#176) ──────────────────────────────────────────────
    KnowledgeChunk:
      type: object
      required: [content]
      properties:
        content: { type: string }
        collection: { type: string }
        document_id: { type: string }
        score: { type: number, format: float }
        metadata:
          type: object
          additionalProperties: true

    KnowledgeSearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        collection:
          type: string
          description: Collection to search; empty = caller's own collection.
        top_k: { type: integer, minimum: 1, maximum: 100, default: 5 }
        threshold: { type: number, format: float, minimum: 0, maximum: 1 }

    KnowledgeSearchResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/KnowledgeChunk' }

    KnowledgeIngestRequest:
      type: object
      required: [content]
      properties:
        title: { type: string }
        content: { type: string, description: Document text (already extracted) }
        collection:
          type: string
          default: default
          description: Target collection; defaults to "default".
        metadata:
          type: object
          additionalProperties: true

    KnowledgeCollectionList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { type: string }

    # ── Hooks (#177, in-memory first slice) ──────────────────────────
    HookEvent:
      type: string
      enum:
        - SessionStart
        - SessionEnd
        - UserPromptSubmit
        - PreToolUse
        - PostToolUse
        - PreInference
        - PostInference
        - Stop
        - Error
      description: |
        The 9 canonical lifecycle events. Validated server-side at
        registration time; unknown values return 400.

    HookSubscription:
      type: object
      required: [id, event, target_url, enabled, created_at]
      properties:
        id: { type: string, readOnly: true }
        event: { $ref: '#/components/schemas/HookEvent' }
        target_url: { type: string, format: uri }
        secret_env:
          type: string
          description: Env var name holding the HMAC shared secret on the partner side.
        description: { type: string }
        enabled: { type: boolean, default: true }
        created_at: { type: string, format: date-time, readOnly: true }

    HookSubscriptionCreate:
      type: object
      required: [event, target_url]
      properties:
        event: { $ref: '#/components/schemas/HookEvent' }
        target_url: { type: string, format: uri }
        secret_env: { type: string }
        description: { type: string }
        enabled: { type: boolean }

    HookSubscriptionList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/HookSubscription' }

    # ── Filesystem (#178, first slice) ───────────────────────────────
    FileMeta:
      type: object
      required: [path, size, mtime]
      properties:
        path: { type: string, description: Agent-visible path including mount prefix (e.g. "/workspace/PLAN.md"). }
        size: { type: integer, format: int64, description: Plaintext byte length. }
        mtime: { type: string, format: date-time }
        content_type: { type: string }
        sha256: { type: string, description: Hex-encoded SHA-256 of the plaintext. Used for If-Match optimistic concurrency. }

    FileMetaList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/FileMeta' }
        has_more: { type: boolean, description: True when truncated by the limit query param. }

    # ── Users (#179) ──────────────────────────────────────────────────
    User:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string, readOnly: true }
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          enum: [admin, manager, developer, employee]
        must_change_password: { type: boolean, readOnly: true }
        created_at: { type: string, format: date-time, readOnly: true }

    UserCreate:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        role:
          type: string
          enum: [admin, manager, developer, employee]
          default: employee

    UserList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/User' }

    # ── Settings (#179) ──────────────────────────────────────────────
    SettingValue:
      type: object
      required: [key, value]
      properties:
        key: { type: string }
        value:
          description: Setting value — type varies per key (string for model identifiers, int for thresholds, bool for feature flags).

    # ── Personas (#187 server / nova-os-sdk#14 SDK) ──────────────────
    PersonaTriage:
      type: string
      enum: [always_brain, never_brain, conditional]
      description: |
        Resolved persona triage default. ``always_brain`` forces the
        planner; ``never_brain`` skips it; ``conditional`` defers to
        the per-turn regex/LLM triage chain. Per-call ``metadata.brain``
        on the messages endpoint still wins as an override. Resolved
        server-side by the canonical ``persona.ResolveTriage`` function
        — partners receive the projected value, not the raw frontmatter.

    PersonaManifestEntry:
      type: object
      required: [id, display_name, capabilities, triage, emits_route_hint_kinds, route_template_names]
      properties:
        id: { type: string }
        display_name: { type: string }
        capabilities:
          type: array
          items: { type: string }
          description: Skill labels the persona dispatches to.
        triage: { $ref: '#/components/schemas/PersonaTriage' }
        emits_route_hint_kinds:
          type: array
          items:
            type: string
            enum: [render_inline, navigate_to, ask_clarification]
          description: Which RouteHint kinds the persona emits at all (drives partner UI prep).
        route_template_names:
          type: array
          items: { type: string }
          description: Keys into the agent's route_templates map; partners pre-resolve URL templates.

    Manifest:
      type: object
      required: [manifest_version, personas]
      description: |
        Boot-time persona discovery contract. Partners cache by
        ``manifest_version`` (sha256 over canonical-JSON) and use
        ``If-None-Match`` on subsequent fetches to short-circuit at 304.
      properties:
        manifest_version:
          type: string
          description: |
            ``sha256:<hex>`` — emitted as ``ETag``. Partners send
            ``If-None-Match: <manifest_version>`` to skip the body when
            unchanged.
        personas:
          type: array
          items: { $ref: '#/components/schemas/PersonaManifestEntry' }

    PersonaNotFoundError:
      type: object
      required: [error, id]
      description: Returned on GET /agents/v1/personas/{id} miss. Distinct envelope from the standard Error type for backwards-compat with the existing `/agents/v1/*` surface.
      properties:
        error: { type: string, example: "persona not found" }
        id: { type: string, description: The requested persona id (echoed back). }

    # ── Sessions (#185) ──────────────────────────────────────────────
    Session:
      type: object
      required: [id, agent_id]
      properties:
        id: { type: string, readOnly: true, description: "Format: sess_<uuid>." }
        agent_id: { type: string }
        environment_id: { type: string }
        model:
          type: string
          description: Session-default LLM override; per-event model on the messages endpoint takes precedence.
        created_at: { type: string, format: date-time, readOnly: true }

    SessionCreate:
      type: object
      required: [agent_id]
      properties:
        agent_id: { type: string }
        environment_id: { type: string }
        model: { type: string }

    # ── Deployment / capabilities read (design D1) ────────────────────
    Deployment:
      type: object
      required: [version, capabilities]
      description: |
        Minimal, derive-friendly capabilities read so a client (web/iOS) can
        discover what this Nova OS instance supports without probing each
        endpoint. Per the contract-unification design (D1, lean: derive),
        this is intentionally small — the persona manifest
        (`GET /agents/v1/personas`) remains the source of truth for *which*
        agents exist; this read surfaces server-level feature flags, model
        tiers, enabled locales, and the auth contract clients need at boot.
        All fields are advisory; absence means "not advertised", not "off".
      properties:
        version:
          type: string
          description: Nova OS server version (e.g. "v0.1.9"). "dev"/"unknown" on unstamped builds.
        capabilities:
          type: array
          description: |
            Stable string labels for optional server features a client may
            branch on (e.g. "observational_memory", "report_generator",
            "async_jobs", "workflows", "knowledge_gate", "ag_ui_streaming").
            Open-ended — unknown labels are ignored by older clients.
          items: { type: string }
        models:
          type: object
          description: |
            Resolved model tiers (advisory; no secrets). Lets a client show
            "powered by" / pick a tier without hardcoding model ids.
          properties:
            answer: { type: string, description: Default answer/synthesis model id. }
            skill: { type: string, description: Cheap-tier skill/section model id. }
            brain: { type: string, description: Planner/brain model id. }
          additionalProperties: false
        locales:
          type: array
          description: Enabled UI locales; first is the default (e.g. ["en","zh-CN"]).
          items: { type: string }
        auth:
          type: object
          description: |
            The interactive-login contract clients should use. OIDC details
            live in the hand-authored `docs/oidc-client-flow.md`; this block
            only advertises the issuer + whether OIDC is enabled so a client
            can construct the Auth-Code+PKCE flow.
          properties:
            oidc_enabled:
              type: boolean
              description: True when the embedded OIDC provider is available for interactive login.
            issuer:
              type: string
              description: OIDC issuer / public base URL (discovery root). Empty when OIDC disabled.
          additionalProperties: false

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Token valid but lacks permission for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found (or hidden from this token's scope).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UpgradeRequired:
      description: SDK or OpenAPI hash major mismatch.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

paths:
  /v1/agents:
    post:
      operationId: createAgent
      summary: Create an agent
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentCreate'
      responses:
        '201':
          description: Agent created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }
    get:
      operationId: listAgents
      summary: List agents
      tags: [Agents]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: owner
          schema: { type: string }
          description: Filter to agents owned by this email.
      responses:
        '200':
          description: Agent list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/agents/{agent_id}:
    parameters:
      - in: path
        name: agent_id
        required: true
        schema: { type: string }
    get:
      operationId: getAgent
      summary: Get an agent
      tags: [Agents]
      responses:
        '200':
          description: Agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateAgent
      summary: Update an agent (partial)
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentUpdate'
      responses:
        '200':
          description: Updated agent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteAgent
      summary: Delete an agent
      tags: [Agents]
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/agents/schema:
    get:
      operationId: getAgentSchema
      summary: Get the AgentDef JSON Schema
      tags: [Agents]
      responses:
        '200':
          description: AgentDef JSON Schema.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '426': { $ref: '#/components/responses/UpgradeRequired' }

  /v1/messages:
    post:
      operationId: createMessage
      summary: Send an Anthropic-compatible message
      description: |
        Route to a Nova OS agent via `metadata.agent_id`; omit for the default agent.

        When `stream:false`, returns a single `MessageResponse`.
        When `stream:true`, returns SSE with one `event:` line + JSON
        payload per event. Event types defined by `StreamEvent`.
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MessageRequest'
      responses:
        '200':
          description: Message response (non-stream) or SSE stream.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }
        '426': { $ref: '#/components/responses/UpgradeRequired' }

  /v1/managed/agents/messages/{message_id}/custom_tool_results:
    parameters:
      - in: path
        name: message_id
        required: true
        schema: { type: string }
    post:
      operationId: submitCustomToolResult
      summary: Submit a custom_tool_use result (Mode A inline)
      description: |
        Used when partner consumes the SSE stream directly. POST the result
        for an emitted `custom_tool_use` event; Nova OS resumes the agent
        loop and continues streaming on the original request connection.
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomToolResultRequest'
      responses:
        '202':
          description: Result accepted; streaming resumes on the original connection.
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/employees:
    post:
      operationId: createEmployee
      summary: Create an employee
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreate'
      responses:
        '201':
          description: Employee created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      operationId: listEmployees
      summary: List employees
      tags: [Employees]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Employee list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/employees/{employee_id}:
    parameters:
      - in: path
        name: employee_id
        required: true
        schema: { type: string }
    get:
      operationId: getEmployee
      summary: Get an employee
      tags: [Employees]
      responses:
        '200':
          description: Employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateEmployee
      summary: Update an employee (partial)
      tags: [Employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdate'
      responses:
        '200':
          description: Updated employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteEmployee
      summary: Delete an employee
      tags: [Employees]
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/employees/{employee_id}/bundle/export:
    parameters:
      - in: path
        name: employee_id
        required: true
        schema: { type: string }
    get:
      operationId: exportEmployeeBundle
      summary: Download a portable .nova-bundle.zip
      tags: [Employees]
      parameters:
        - in: query
          name: include_knowledge
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Zip bundle.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/employees/bundle/import:
    post:
      operationId: importEmployeeBundle
      summary: Import a .nova-bundle.zip
      tags: [Employees]
      parameters:
        - in: query
          name: on_conflict
          schema:
            type: string
            enum: [overwrite, skip, error]
            default: error
      requestBody:
        required: true
        content:
          application/zip:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Imported.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleImportResult'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Conflict — existing employee with same id and `on_conflict=error`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/managed/agents/jobs:
    post:
      operationId: createJob
      summary: Submit an async agent run
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreate'
      responses:
        '202':
          description: Job queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    get:
      operationId: listJobs
      summary: List jobs
      tags: [Jobs]
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/JobStatus'
        - in: query
          name: agent_id
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Job list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobList'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/agents/jobs/{job_id}:
    parameters:
      - in: path
        name: job_id
        required: true
        schema: { type: string }
    get:
      operationId: getJob
      summary: Get a job
      tags: [Jobs]
      responses:
        '200':
          description: Job.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: cancelJob
      summary: Cancel a job (graceful drain)
      tags: [Jobs]
      responses:
        '202':
          description: Cancellation accepted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/agents/jobs/{job_id}/stream:
    parameters:
      - in: path
        name: job_id
        required: true
        schema: { type: string }
      - in: header
        name: Last-Event-ID
        schema: { type: string }
        description: Resume from event seq — replays missed events from PG before live broadcast.
    get:
      operationId: streamJob
      summary: SSE stream for an async job (with replay)
      tags: [Jobs]
      responses:
        '200':
          description: SSE stream.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEvent'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Documents (#175) ────────────────────────────────────────────────
  /v1/managed/documents:
    get:
      operationId: listDocuments
      summary: List documents in a collection
      tags: [Documents]
      parameters:
        - in: query
          name: collection_id
          schema: { type: string }
          description: Collection to enumerate; empty = root.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Document list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/documents/upload:
    post:
      operationId: uploadDocument
      summary: Upload a document
      tags: [Documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                collection_id:
                  type: string
                  description: Target collection; empty = root.
      responses:
        '201':
          description: Document uploaded and auto-indexed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/documents/{document_id}:
    parameters:
      - in: path
        name: document_id
        required: true
        schema: { type: string }
    delete:
      operationId: deleteDocument
      summary: Delete a document
      tags: [Documents]
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Knowledge (#176) ────────────────────────────────────────────────
  /v1/managed/knowledge/search:
    post:
      operationId: searchKnowledge
      summary: Hybrid search across the knowledge base
      tags: [Knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KnowledgeSearchRequest' }
      responses:
        '200':
          description: Ranked passages.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeSearchResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/managed/knowledge/ingest:
    post:
      operationId: ingestKnowledge
      summary: Ingest a document into a knowledge collection
      tags: [Knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KnowledgeIngestRequest' }
      responses:
        '201':
          description: Document ingested.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ingested] }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /v1/managed/knowledge/collections:
    get:
      operationId: listKnowledgeCollections
      summary: List every knowledge collection
      tags: [Knowledge]
      responses:
        '200':
          description: Collection name list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KnowledgeCollectionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Hooks (#177) ────────────────────────────────────────────────────
  /v1/managed/hooks:
    get:
      operationId: listHooks
      summary: List lifecycle-hook subscriptions
      tags: [Hooks]
      responses:
        '200':
          description: Subscription list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HookSubscriptionList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createHook
      summary: Register a lifecycle-hook subscription
      tags: [Hooks]
      description: |
        Note: as of v0.1.5 the in-memory store accepts subscriptions but
        the runtime hook bus does not yet bridge to it. Persistence and
        bus bridge land in a follow-up; partners wiring integrations now
        get a stable contract.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HookSubscriptionCreate' }
      responses:
        '201':
          description: Subscription created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HookSubscription' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/hooks/{hook_id}:
    parameters:
      - in: path
        name: hook_id
        required: true
        schema: { type: string }
    get:
      operationId: getHook
      summary: Get a hook subscription
      tags: [Hooks]
      responses:
        '200':
          description: Subscription.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HookSubscription' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteHook
      summary: Deregister a hook subscription
      tags: [Hooks]
      description: Idempotent — returns 204 even if the subscription doesn't exist.
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Filesystem (#178) ──────────────────────────────────────────────
  /v1/managed/filesystem/{tenant_id}/{session_id}/files:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
      - in: path
        name: session_id
        required: true
        schema: { type: string }
    get:
      operationId: listFiles
      summary: List files in a workspace
      tags: [Filesystem]
      parameters:
        - in: query
          name: mount
          schema: { type: string, default: /workspace }
        - in: query
          name: glob
          schema: { type: string }
          description: filepath.Match pattern applied to the basename.
        - in: query
          name: recursive
          schema: { type: string, enum: ["1", "true"] }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
      responses:
        '200':
          description: File list with metadata.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMetaList' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/managed/filesystem/{tenant_id}/{session_id}/files/{path}:
    parameters:
      - in: path
        name: tenant_id
        required: true
        schema: { type: string }
      - in: path
        name: session_id
        required: true
        schema: { type: string }
      - in: path
        name: path
        required: true
        schema: { type: string }
        description: |
          File path within the workspace. URL-encoded; mount prefix is implicit.
    get:
      operationId: readFile
      summary: Read a file's raw bytes
      tags: [Filesystem]
      responses:
        '200':
          description: File content (Content-Type from the file's stored metadata).
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: writeFile
      summary: Write or overwrite a file
      tags: [Filesystem]
      parameters:
        - in: header
          name: If-Match
          schema: { type: string }
          description: SHA-256 of the current content for optimistic concurrency.
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        '200':
          description: File written.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FileMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '412':
          description: If-Match precondition failed.
        '507':
          description: Quota exceeded.
    delete:
      operationId: deleteFile
      summary: Delete a file
      tags: [Filesystem]
      description: Idempotent — returns 204 even if the file doesn't exist.
      responses:
        '204': { description: Deleted. }

  # ── Users (#179) ────────────────────────────────────────────────────
  /v1/managed/users:
    get:
      operationId: listUsers
      summary: List users
      tags: [Users]
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      operationId: createUser
      summary: Create a user (default password; trigger reset on first sign-in)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/users/{user_id}:
    parameters:
      - in: path
        name: user_id
        required: true
        schema: { type: string }
    get:
      operationId: getUser
      summary: Get a user
      tags: [Users]
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [Users]
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Settings (#179) ────────────────────────────────────────────────
  /v1/managed/settings:
    get:
      operationId: listSettings
      summary: Read every platform setting
      tags: [Settings]
      responses:
        '200':
          description: Map of key → value. Value type varies per key.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/settings/{key}:
    parameters:
      - in: path
        name: key
        required: true
        schema: { type: string }
    get:
      operationId: getSetting
      summary: Read a single setting
      tags: [Settings]
      responses:
        '200':
          description: Setting value.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettingValue' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: putSetting
      summary: Write a single setting
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  description: New value (type varies per key).
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SettingValue' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ── Sessions (#185) ────────────────────────────────────────────────
  /v1/managed/sessions:
    post:
      operationId: createManagedSession
      summary: Create a Nova OS native session
      tags: [Sessions]
      description: |
        Native partner-prefix session create. Shares the SessionStore
        with the Anthropic-compat /v1/sessions surface — state is
        consistent across the two mounts. No `anthropic-beta` header
        gate; partner-friendly response shape.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SessionCreate' }
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/managed/sessions/{session_id}:
    parameters:
      - in: path
        name: session_id
        required: true
        schema: { type: string }
    get:
      operationId: getManagedSession
      summary: Get a session by ID
      tags: [Sessions]
      responses:
        '200':
          description: Session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Personas (nova-os-sdk#14, server PR #187) ─────────────────────
  /agents/v1/personas:
    get:
      operationId: listPersonas
      summary: Boot-time persona manifest with ETag round-trip
      tags: [Personas]
      description: |
        Returns the manifest envelope (`manifest_version` sha256 + every
        registered persona). Partners cache by `manifest_version` and
        send `If-None-Match` on subsequent fetches; the server replies
        304 with no body when the manifest hasn't changed.
      parameters:
        - in: header
          name: If-None-Match
          schema: { type: string }
          description: Cached `manifest_version` from a prior fetch.
      responses:
        '200':
          description: Full manifest.
          headers:
            ETag:
              schema: { type: string }
              description: The current `manifest_version`. Round-trip via `If-None-Match`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Manifest' }
        '304':
          description: Manifest unchanged. No body. Partner's cached version is current.

  /agents/v1/personas/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: getPersonaByID
      summary: Fetch a single persona by id
      description: |
        Returns the manifest entry for a single registered persona. 404 with
        a PersonaNotFoundError envelope when no persona matches the id.
      tags: [Personas]
      responses:
        '200':
          description: Persona entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonaManifestEntry' }
        '404':
          description: No persona with that id is registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PersonaNotFoundError' }

  # ── Deployment / capabilities (design D1) ─────────────────────────
  /v1/managed/deployment:
    get:
      operationId: getDeployment
      summary: Read this instance's capabilities, model tiers, locales, and auth contract
      tags: [Deployment]
      description: |
        Minimal capabilities read for boot-time client configuration. Lets a
        web or iOS client discover server version, optional feature labels,
        resolved model tiers, enabled locales, and the OIDC auth contract
        without probing individual endpoints. Per the contract-unification
        design (D1, lean: derive), this is deliberately small and advisory —
        `GET /agents/v1/personas` remains the source of truth for which agents
        exist.
      responses:
        '200':
          description: Deployment capabilities.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deployment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
