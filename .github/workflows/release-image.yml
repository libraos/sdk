# Publishes the Nova OS server as a public Docker image to GitHub Container
# Registry. Source code lives in the private MeganovaAI/nova-os repo; this
# workflow checks it out via SSH deploy key, builds, and pushes from the
# public nova-os-sdk repo so that:
#
#   1. The package's "linked repository" on GitHub points at this public
#      repo — no leak of the private nova-os repo's existence to logged-in
#      org members visiting the package page.
#   2. The OCI org.opencontainers.image.source label resolves to a public
#      repo for partners clicking through from the package page.
#
# Trigger: workflow_dispatch with a `tag` input naming the source-side tag
# (e.g. `v0.1.4` or `v0.2.0-rc1`). The workflow checks out that tag from
# the private nova-os repo and builds the image labelled with the same tag.
#
# Output:
#   ghcr.io/meganovaai/nova-os:<tag>            (always)
#   ghcr.io/meganovaai/nova-os:latest            (only for stable vX.Y.Z tags;
#                                                 skipped for rc/beta/alpha)
#
# Architectures: linux/amd64 + linux/arm64.
#
# One-time setup required (see docs/release-image-setup.md):
#   1. Generate an SSH key pair.
#   2. Add the public key as a read-only Deploy Key on MeganovaAI/nova-os.
#   3. Store the private key as the `NOVA_OS_DEPLOY_KEY` repository secret on
#      this repo (MeganovaAI/nova-os-sdk).
#   4. On the package settings page (Manage Actions access), grant
#      MeganovaAI/nova-os-sdk write permission so this workflow can push.

name: Release Docker image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Source tag in MeganovaAI/nova-os to build and publish (e.g. v0.1.4)'
        required: true
        type: string

concurrency:
  group: release-image-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build + push image
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout private nova-os source via deploy key
        uses: actions/checkout@v4
        with:
          repository: MeganovaAI/nova-os
          ref: ${{ inputs.tag }}
          ssh-key: ${{ secrets.NOVA_OS_DEPLOY_KEY }}
          # Need full history so any `git describe` style stamping in the
          # build path resolves correctly.
          fetch-depth: 0
          persist-credentials: false

      - name: Decide whether to update :latest
        id: latest
        run: |
          # Only stable tags update :latest. RC / beta / alpha don't.
          tag="${{ inputs.tag }}"
          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (cross-arch emulation for arm64 builds on amd64 runner)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/meganovaai/nova-os
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ steps.latest.outputs.update == 'true' }}
          # Standard OCI labels — show up on the package page.
          labels: |
            org.opencontainers.image.title=Nova OS
            org.opencontainers.image.description=Enterprise AI Operating System (Go) — server image. BUSL-1.1 for evaluation and development; production deployments require a commercial license (contact@libraos.com).
            org.opencontainers.image.url=https://github.com/MeganovaAI/nova-os-sdk
            org.opencontainers.image.source=https://github.com/MeganovaAI/nova-os-sdk
            org.opencontainers.image.version=${{ inputs.tag }}
            org.opencontainers.image.licenses=BUSL-1.1
            org.opencontainers.image.vendor=MeganovaAI

      - name: Resolve source commit SHA
        id: src
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build + push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.tag }}
            BUILD_SHA=${{ steps.src.outputs.sha }}
            BUILD_DATE=${{ github.run_started_at }}
          cache-from: type=registry,ref=ghcr.io/meganovaai/nova-os:buildcache
          cache-to: type=registry,ref=ghcr.io/meganovaai/nova-os:buildcache,mode=max

      - name: Summary
        run: |
          tag="${{ inputs.tag }}"
          echo "## Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/meganovaai/nova-os:${tag}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.latest.outputs.update }}" = "true" ]; then
            echo "- \`ghcr.io/meganovaai/nova-os:latest\` (updated — stable release)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- \`ghcr.io/meganovaai/nova-os:latest\` not updated (pre-release tag)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Source: \`MeganovaAI/nova-os@${{ steps.src.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Partner pull" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/meganovaai/nova-os:${tag}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
