name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write     # for github releases
  packages: write     # for ghcr.io
  id-token: write     # for cosign keyless signing

jobs:
  build-python:
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install build twine

      - name: Build sdist + wheel
        run: |
          cd python
          python -m build

      - name: Verify metadata
        run: |
          cd python
          twine check dist/*

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            python/dist/*

      - name: Publish to PyPI
        if: env.PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_API_TOKEN }}
        run: |
          cd python
          twine upload dist/*

  build-typescript:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install + build
        run: |
          cd clients/typescript
          npm ci
          npm run build

      - name: Pack tarball
        run: cd clients/typescript && npm pack

      - name: Upload tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            clients/typescript/*.tgz

      - name: Publish to npm
        # Mirrors the PyPI job: only publishes when the org token secret is set.
        # Scoped package -> --access public. Prerelease versions (0.x-alpha) go
        # to the `next` dist-tag so they never become `latest`.
        if: env.NPM_TOKEN != ''
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          cd clients/typescript
          VER=$(node -p "require('./package.json').version")
          if echo "$VER" | grep -q '-'; then TAG=next; else TAG=latest; fi
          echo "Publishing @libraos/client@$VER under dist-tag '$TAG'"
          npm publish --access public --tag "$TAG"

  build-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: cli/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
        with:
          cosign-release: 'v2.4.1'

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
